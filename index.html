<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:#F7F6F2;color:#1C1917}
.serif{font-family:"Cormorant Garamond",serif}
.btn{cursor:pointer;border:none;border-radius:8px;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;transition:all .18s}
.btn:hover{filter:brightness(.92)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.card{background:white;border-radius:14px;border:1px solid #E8E5DF}
.tag{border-radius:20px;font-size:11px;font-weight:500;padding:3px 10px;display:inline-block}
.tab{padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;transition:all .18s;border:none;background:transparent;font-family:"DM Sans",sans-serif;white-space:nowrap}
.tab.active{background:#1C1917;color:white}
.tab:not(.active){color:#78716C}
.tab:not(.active):hover{background:#EFEDE8}
input,textarea,select{font-family:"DM Sans",sans-serif;font-size:13px;border:1px solid #E8E5DF;border-radius:8px;padding:9px 12px;width:100%;outline:none;background:white;color:#1C1917}
input:focus,textarea:focus,select:focus{border-color:#92400E}
.crow{padding:12px 16px;border-radius:10px;cursor:pointer;transition:background .15s;border:1.5px solid transparent}
.crow:hover{background:#F5F3EE}
.crow.sel{background:#FFF8F0;border-color:#F59E0B}
.scroll{overflow-y:auto}
.scroll::-webkit-scrollbar{width:4px}
.scroll::-webkit-scrollbar-thumb{background:#D6D3D1;border-radius:4px}
.chbtn{padding:6px 12px;border-radius:8px;border:1.5px solid #E8E5DF;cursor:pointer;font-size:12px;font-weight:500;font-family:"DM Sans",sans-serif;background:white}
.chbtn.active{border-color:#92400E;background:#FFF8F0;color:#92400E}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.aibtn{background:linear-gradient(135deg,#7C3AED,#A855F7);color:white;padding:9px 18px;border-radius:9px;border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif}
.aibtn:disabled{opacity:.6;cursor:not-allowed}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:white;border-radius:18px;padding:28px;width:620px;max-width:100%;max-height:92vh;overflow-y:auto}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeIn .25s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 1.2s infinite}
.pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:#78716C;margin-bottom:4px;font-weight:500}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}

function hasCare(c) {
  if (!c) return false;
  var sess = curSess(c);
  var s = (sess.service || c.service || "").toLowerCase();
  var p = (sess.plan || c.plan || "").toLowerCase();
  if (s.indexOf("homemaker") >= 0) return true;
  for (var i = 0; i < CARE_KW.length; i++) { if (p.indexOf(CARE_KW[i]) >= 0) return true; }
  return false;
}
function hasCareWithPkg(c, pkgKeywords) {
  if (!c) return false;
  var sess = curSess(c);
  var s = (sess.service || c.service || "").toLowerCase();
  var p = (sess.plan || c.plan || "").toLowerCase();
  if (s.indexOf("homemaker") >= 0) return true;
  var kws = pkgKeywords || CARE_KW;
  for (var i = 0; i < kws.length; i++) { if (p.indexOf(kws[i]) >= 0) return true; }
  return false;
}
function isOffline(c) {
  var sess = curSess(c);
  var m = (sess.sesMode || c.sesMode || "").toLowerCase();
  return m.indexOf("person") >= 0 || m.indexOf("offline") >= 0;
}
function curSess(c) {
  if (!c || !c.sessions || !c.sessions.length) return c || {};
  return c.sessions[c.currentSession || 0] || c.sessions[0];
}
function cStage(c) { return (curSess(c).stage) || "New Inquiry"; }

function payText(c) {
  var t = "Full Payment Upfront:\n\nUPI/Google Pay/Paytm: " + UPI + "\n\nBank Transfer:\n" + BANK_DETAILS;
  if (isOffline(c)) t += "\n\nCash accepted in person.\nAddress: " + MAPS_LINK;

}

  var msgs = {

    },
    payment_reminder:{
      wa:"Hi " + nm + "! Gentle reminder - your payment for " + plan + " is pending. Please complete payment to confirm your appointment.\n\n" + payText(c) + "\n\nTaniya",
      em:"Subject: Payment Reminder\n\nHi " + nm + ",\n\nFriendly reminder that payment is pending.\n\n" + payText(c) + "\n\nWarm regards,\nTaniya"
    },
    care_dispatch:{
      wa:"Hi " + nm + "! Payment received - thank you! Your care package is being packed and will be dispatched soon." + da + "\n\nPlease let me know once you receive it!\n\nWarm regards,\nTaniya",
      em:"Subject: Payment Received - Care Package Dispatched\n\nHi " + nm + ",\n\nPayment confirmed! Your care package is being prepared." + da + "\n\nWarm regards,\nTaniya"
    },

      em:"Subject: Care Package Delivery Check\n\nHi " + nm + ",\n\nJust checking on your care package delivery. Please let us know once it arrives!\n\nWarm regards,\nTaniya"

    },

      em:"Subject: Session Reminder - Today!\n\nHi " + nm + ",\n\nReminder - your session is today!\n\n" + si + "\n\nSee you soon!\nTaniya"
    },
    weekly_followup:{
      wa:"Hi " + nm + "! Hope your first week on the plan is going well. Any wins or challenges to share? I am here to support you!\n\nWarm regards,\nTaniya",
      em:"Subject: Weekly Check-in\n\nHi " + nm + ",\n\nHope this week has been great! How is the plan going?\n\nWarm regards,\nTaniya"
    },
    reengagement:{
      wa:"Hi " + nm + "! It has been a while. How are you doing with your health goals? I would love to reconnect - I have a few slots this month.\n\nWarm regards,\nTaniya",
      em:"Subject: Checking In On Your Wellness Journey\n\nHi " + nm + ",\n\nHope you are doing wonderfully! I have slots open if you would like to reconnect.\n\nWarm regards,\nTaniya"
    },
    followup:{
      wa:"Hi " + nm + "! Just checking in on how your program is going. Any questions or support needed?\n\nWarm regards,\nTaniya",
      em:"Subject: Following Up\n\nHi " + nm + ",\n\nJust checking in! How is everything going with your program?\n\nWarm regards,\nTaniya"
    }
  };
  var m = msgs[type];
  if (!m) return "";
  return ch === "em" ? m.em : m.wa;
}

var CL = {
  "New Inquiry":["Review client form","Check preferred slot","Verify package","Prepare payment message"],
  "Awaiting Payment":["Payment message sent on WhatsApp","Payment message sent on Email","Follow up if no payment after 24hrs","Mark payment once received"],
  "Payment Received":["Calendar event created","Meet link or address sent","Care package dispatched if applicable","Client notified"],
  "Care Package Dispatched":["Package packed and dispatched","Note dispatch date","Follow up in 3 days","Wait for client confirmation"],
  "Session Confirmed":["Session reminder sent on session day","Notes prepared","Intake form reviewed","Health details checked"],
  "Active Client":["Weekly check-in sent","Meal plan reviewed","Session notes updated","Next appointment booked"],
  "Follow-up":["Re-engagement message sent","Last interaction noted","Offer returning client pricing","Update stage"]
};

var COL = {
  name:"Name", email:"Email Address", phone:"Phone Number (preferably WhatsApp)",
  dob:"Date of Birth", gender:"Gender", city:"City /Location",
  workedBefore:"Have you worked with me before?",
  lastProgram:"** Which program did we last work on together?",
  progress:"** How has your progress been since we last worked together? ",
  refCode:"** Please enter your referral/ client code",
  serviceRet:"** Which service would you like to book?",
  prevNutri:"* Have you worked with a nutritionist or dietitian before? ",
  source:"* How did you hear about me?",
  serviceNew:"* Which service would you like to book?",
  planCN:"* Choose your 1:1 Nutrition Consultation plan",
  planHN:"* Choose your Habit Building Program plan",
  planFN:"* Choose your Metabolic Reset plan",
  planMN:"* Choose your Homemaker's Family plan",
  planCR:"** Choose your 1:1 Nutrition Consultation plan",
  planHR:"** Choose your Habit Building plan",
  planFR:"** Choose your Metabolic Reset plan",
  planMR:"** Choose your Homemaker's Family plan",
  goal:"What are your primary health goals or concerns?",
  conditions:"Do you have any existing health conditions? (Select all that apply)",
  onMed:"Are you currently on any medication?",
  meds:"Name of Medicines taken and its doses.",
  sesMode:"How would you like to attend your session?",
  prefWE:"Preferred Slot [Weekend]",

  prefDate:"Preferred Date",
  extraNotes:"Anything else you d like me to know before your session? ",
  labs:"Please upload your latest blood reports or doctor s prescription for reference.",
  callingPhone:"Calling Phone Number",
  deliveryLine1:"Delivery Address Line 1 (House number / Apartment / Building name)",
  deliveryLine2:"Delivery Address Line 2 (Street / Area / Locality)",
  deliveryCity:"City, State",
  deliveryPin:"PIN Code",
  deliveryLandmark:"Landmark (Optional) Example: Near ABC School / Opposite XYZ Mall",
  deliveryTime:"Preferred Delivery Time",
  isPreferredAddress:"Is this your preferred delivery address?",
  finalConfirmation:"FINAL CONFIRMAION"
};

function getPlan(row) {
  var ps = [
    {s:"1:1 Nutrition",t:"New Client",k:COL.planCN},
    {s:"1:1 Nutrition",t:"Returning",k:COL.planCR},
    {s:"Habit Building",t:"New Client",k:COL.planHN},
    {s:"Habit Building",t:"Returning",k:COL.planHR},
    {s:"Metabolic Reset",t:"New Client",k:COL.planFN},
    {s:"Metabolic Reset",t:"Returning",k:COL.planFR},
    {s:"Homemaker Family",t:"New Client",k:COL.planMN},
    {s:"Homemaker Family",t:"Returning",k:COL.planMR}
  ];
  for (var i = 0; i < ps.length; i++) { if (row[ps[i].k]) return {plan:row[ps[i].k],service:ps[i].s,ct:ps[i].t}; }
  var hasRet = !!row[COL.serviceRet];
  return {plan:"",service:row[COL.serviceNew]||row[COL.serviceRet]||"",ct:hasRet?"Returning":"New Client"};
}

function parseDate(ts) {
  if (!ts) return "";
  try {
    var d;
    if (typeof ts === "number") {
      // Google Sheets serial date - convert to IST
      d = new Date((ts - 25569) * 86400 * 1000);
    } else {
      // String date - parse and adjust for IST (UTC+5:30)
      d = new Date(ts);
      if (isNaN(d.getTime())) return String(ts);
    }
    if (isNaN(d.getTime())) return String(ts);
    // Format in IST
    return d.toLocaleDateString("en-IN",{month:"short",day:"numeric",year:"2-digit",timeZone:"Asia/Kolkata"});
  } catch(e) { return String(ts)||""; }
}

function formatSlot(val) {
  // Show slot exactly as client entered - no date conversion
  if (!val) return "";
  return String(val).trim();
}

function genCode(clients, date) {
  var d; try { d = date ? new Date(date) : new Date(); if (isNaN(d.getTime())) d = new Date(); } catch(e) { d = new Date(); }
  var yy = String(d.getFullYear()).slice(-2);
  var mm = String(d.getMonth()+1).padStart(2,"0");
  var existing = clients.filter(function(c){ return c.cc && c.cc.startsWith(yy) && c.cc.slice(3,5)===mm; });
  var allCodes = clients.map(function(c){ return c.cc; }).filter(Boolean);
  var serial = existing.length + 1;
  var code = "";
  var attempts = 0;
  while (attempts < 200) {
    var batch = Math.floor((serial-1)/100);
    var rem = batch===0 ? serial : (serial-1)%100;
    code = yy+batch+mm+String(rem).padStart(2,"0");
    if (allCodes.indexOf(code) === -1) break;
    serial++;
    attempts++;
  }
  return code;
}

function makeSession(row, num) {
  var p = getPlan(row);
  var ds = parseDate(row["Timestamp"] || row.Timestamp);
  if (!ds) ds = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
  return {
    sessionNum:num||1, date:ds, plan:p.plan, service:p.service, ct:p.ct,
    stage:"New Inquiry", sesMode:row[COL.sesMode]||"",
    prefWE:formatSlot(row[COL.prefWE]), prefWD:formatSlot(row[COL.prefWD]), prefDate:formatSlot(row[COL.prefDate]),
    prefSlot:formatSlot(row[COL.prefDate]||row[COL.prefWE]||row[COL.prefWD]),
    extraNotes:row[COL.extraNotes]||"", labs:row[COL.labs]||"", meetLink:"",
    refCode:row[COL.refCode]||"", sessionNotes:"",
    deliveryLine1:row[COL.deliveryLine1]||"", deliveryLine2:row[COL.deliveryLine2]||"",
    deliveryCity:row[COL.deliveryCity]||"", deliveryPin:String(row[COL.deliveryPin]||""),
    deliveryLandmark:row[COL.deliveryLandmark]||"", deliveryTime:row[COL.deliveryTime]||"",
    isPreferredAddress:row[COL.isPreferredAddress]||"", finalConfirmation:row[COL.finalConfirmation]||"",
    callingPhone:String(row[COL.callingPhone]||"")
  };
}

function parseRow(row) {
  var ds = parseDate(row["Timestamp"] || row.Timestamp);
  if (!ds) ds = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
  var session = makeSession(row, 1);
  return {
    id:Date.now()+Math.random(),
    name:row[COL.name]||row["Name"]||"Unknown",
    email:row[COL.email]||row["Email Address"]||"",
    phone:String(row[COL.phone]||row["Phone Number (preferably WhatsApp)"]||""),
    dob:row[COL.dob]||"", gender:row[COL.gender]||"", city:row[COL.city]||"",
    workedBefore:row[COL.workedBefore]||"", lastProgram:row[COL.lastProgram]||"",
    progress:row[COL.progress]||"", prevNutri:row[COL.prevNutri]||"",
    source:row[COL.source]||"Form", goal:row[COL.goal]||"",
    conditions:row[COL.conditions]||"", onMed:row[COL.onMed]||"", meds:row[COL.meds]||"",
    cc:"", date:ds, referredBy:"", referredByName:"", referralCount:0,
    sessions:[session], currentSession:0, scheduledMessages:[]
  };
}

function assignCodes(clients) {
  var sorted = clients.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  var used = {};
  return sorted.map(function(c){
    if (c.cc){used[c.cc]=1;return c;}
    var code = genCode(Object.keys(used).map(function(k){return{cc:k};}),c.date);
    used[code]=1;
    return Object.assign({},c,{cc:code});
  });
}

function detectAndMerge(incoming, existing) {
  var updatedExisting = existing.slice();
  var toAdd = [];
  incoming.forEach(function(newC) {
    var refCode = (newC.sessions[0] && newC.sessions[0].refCode) || "";
    if (refCode) {
      var referrer = existing.find(function(c){ return c.cc === refCode; });
      if (referrer) {
        var nameMatch = referrer.name.toLowerCase().trim() === newC.name.toLowerCase().trim();
        var emailMatch = referrer.email.toLowerCase().trim() === newC.email.toLowerCase().trim();
        if (nameMatch || emailMatch) {
          // RETURNING - add session to existing
          newC.sessions[0].sessionNum = (referrer.sessions ? referrer.sessions.length : 0) + 1;
          updatedExisting = updatedExisting.map(function(c){
            if (c.id !== referrer.id) return c;
            var sessions = (c.sessions||[]).concat(newC.sessions);
            return Object.assign({},c,{sessions:sessions,currentSession:sessions.length-1});
          });
          return;
        } else {
          // REFERRAL - new person, mark referrer
          newC.referredBy = refCode;
          newC.referredByName = referrer.name;
          updatedExisting = updatedExisting.map(function(c){
            if (c.id !== referrer.id) return c;
            return Object.assign({},c,{referralCount:(c.referralCount||0)+1});
          });
        }
      }
    }
    // Check email duplicate
    var existing_email = existing.find(function(c){ return c.email && c.email.toLowerCase() === (newC.email||"").toLowerCase(); });
    if (!existing_email) toAdd.push(newC);
  });
  return assignCodes(updatedExisting.concat(toAdd));
}

// SCHEDULING
function scheduleMessages(client, newStage) {
  var now = new Date();
  var rules = {
    "Awaiting Payment":[{type:"payment_reminder",label:"Payment Reminder",days:1}],
    "Care Package Dispatched":[{type:"care_followup",label:"Care Package Follow-up",days:3}],
    "Session Confirmed":[{type:"session_reminder",label:"Session Reminder",days:0,morning:true},{type:"diet_chart",label:"Diet Chart Due (72hrs)",days:3,morning:true}],
    "Active Client":[{type:"weekly_followup",label:"Weekly Check-in",days:7}],
    "Follow-up":[{type:"reengagement",label:"Re-engagement",days:30}]
  };
  if(client.programEndDate){
    var endDate=new Date(client.programEndDate);
    var daysToEnd=Math.ceil((endDate-now)/86400000);
    if(daysToEnd>0&&daysToEnd<=7){
      var endDateStr=endDate.toLocaleDateString("en-US",{month:"long",day:"numeric"});
      var endWa="Hi "+client.name.split(" ")[0]+"! Your current program ends on "+endDateStr+". Would you like to discuss continuing? Warm regards, Taniya";
      var endEm="Subject: Program Ending Soon\n\nHi "+client.name.split(" ")[0]+",\n\nYour program ends on "+endDateStr+". Please reach out to discuss next steps!\n\nWarm regards,\nTaniya";
      existing.push({id:Date.now()+Math.random(),type:"program_end",label:"Program Ending Soon",clientId:client.id,clientName:client.name,scheduledFor:endDate.toISOString(),sent:false,waMsg:endWa,emMsg:endEm,phone:client.phone,email:client.email});
    }
  }
  var r = rules[newStage];
  if (!r) return client.scheduledMessages || [];
  var existing = (client.scheduledMessages || []).filter(function(m){ return !m.sent; });
  r.forEach(function(rule) {
    var sendAt = new Date(now);
    if (rule.morning) {
      sendAt.setHours(8,0,0,0);
      if (sendAt <= now) sendAt.setDate(sendAt.getDate()+1);
    } else {
      sendAt.setDate(sendAt.getDate() + rule.days);
      sendAt.setHours(8,0,0,0);
    }
    existing.push({
      id: Date.now()+Math.random(),
      type: rule.type,
      label: rule.label,
      clientId: client.id,
      clientName: client.name,
      scheduledFor: sendAt.toISOString(),
      sent: false,
      waMsg: buildMsg(client, rule.type, "wa"),
      emMsg: buildMsg(client, rule.type, "em"),
      phone: client.phone,
      email: client.email
    });
  });
  return existing;
}

function getUpcomingBirthdays(clients) {
  var today = new Date();
  today.setHours(0,0,0,0);
  return clients.filter(function(c) {
    if (!c.dob) return false;
    try {
      var d = new Date(c.dob);
      if (isNaN(d.getTime())) return false;
      var thisYear = new Date(today.getFullYear(), d.getMonth(), d.getDate());
      if (thisYear < today) thisYear.setFullYear(today.getFullYear()+1);
      var diff = Math.ceil((thisYear - today) / 86400000);
      return diff > 0 && diff <= 7;
    } catch(e) { return false; }
  }).map(function(c) {
    var d = new Date(c.dob);
    var thisYear = new Date(today.getFullYear(), d.getMonth(), d.getDate());
    if (thisYear < today) thisYear.setFullYear(today.getFullYear()+1);
    var daysLeft = Math.ceil((thisYear - today) / 86400000);
    return Object.assign({}, c, {daysUntilBirthday:daysLeft, birthdayDate:thisYear.toLocaleDateString("en-US",{month:"long",day:"numeric"})});
  }).sort(function(a,b){return a.daysUntilBirthday - b.daysUntilBirthday;});
}

function getSchedStatus(scheduledFor) {
  var now = new Date();
  var then = new Date(scheduledFor);
  var diff = then - now;
  if (diff < 0) return "overdue";
  if (diff < 86400000) return "today";
  if (diff < 86400000*3) return "soon";
  return "future";
}

function formatSchedTime(scheduledFor) {
  var d = new Date(scheduledFor);
  var now = new Date();
  var diff = d - now;
  if (diff < 0) {
    var ago = Math.abs(diff);
    if (ago < 3600000) return Math.floor(ago/60000) + " mins overdue";
    if (ago < 86400000) return Math.floor(ago/3600000) + " hrs overdue";
    return Math.floor(ago/86400000) + " days overdue";
  }
  if (diff < 86400000) return "Today at " + d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
  if (diff < 86400000*2) return "Tomorrow at " + d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"}) + " at " + d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
}

  function initiateMove(c, dir) {
    var idx = STAGES.indexOf(cStage(c));
    var next = STAGES[idx+dir];
    if (!next) return;
    if (dir===-1) { updClient(c.id,{stage:next}); return; }
    var msgType = "";
    if (next==="Awaiting Payment") msgType="payment";
    else if (next==="Payment Received") msgType=hasCare(c)?"care_dispatch":"session_confirm";
    else if (next==="Care Package Dispatched") msgType="care_dispatch";
    else if (next==="Session Confirmed") msgType="session_confirm";
    else if (next==="Follow-up") msgType="followup";
    if (msgType) openSend(c,next,msgType,false);
    else { updClient(c.id,{stage:next}); }
  }

  async function confirmMove() {
    if (!sendCtx) return;
    var c=sendCtx.c; var next=sendCtx.next;
    if (!sendCtx.isReminder && (next==="Payment Received"||next==="Session Confirmed") && !isOffline(c) && gToken) {
      setCalLoad(true);
      var ml = await gCreateCalEvent(gToken,c);
      setCalLoad(false);
      if (ml) {

        setSendWa(function(p){return p.replace("[MEET LINK]",ml);});
        setSendEm(function(p){return p.replace("[MEET LINK]",ml);});

    if (!sendCtx.isReminder) {
      var newScheds = scheduleMessages(c, next);
      updClient(c.id,{stage:next});
      setClients(function(prev){return prev.map(function(cl){
        if(cl.id!==c.id)return cl;
        return Object.assign({},cl,{scheduledMessages:newScheds});

      var sent = 0;

        var r = recipients[i];

        setBulkProgress("Sending " + (i+1) + " of " + recipients.length + "...");
        var subj = "A message from Body Bio Balance Consultancy";

        await new Promise(function(res){ setTimeout(res, 500); });

      setBulkProgress("");
      showToast(sent + " emails sent successfully!");

      // WhatsApp - open one by one
      var withPhone = recipients.filter(function(r){ return r.phone; });

      setBulkSending(false);

      }

    }

              <div className="field" style={{gridColumn:"1/-1"}}><label>Supplements Currently Taking</label><input value={editData.supplements||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{supplements:e.target.value});})}}/></div>
              <div className="field"><label>Dietary Restrictions</label><select value={editData.dietaryRestrictions||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{dietaryRestrictions:e.target.value});})}}>
                <option value="">Select</option>{["Vegetarian","Vegan","Jain","Non-vegetarian","Eggetarian","Other"].map(function(x){return <option key={x}>{x}</option>;})}
              </select></div>
            </div>
            {hasCare(editData)&&<div>
              <p style={{fontSize:11,fontWeight:600,color:"#1D4ED8",textTransform:"uppercase",letterSpacing:".08em",marginBottom:8,marginTop:4}}>Delivery Address</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:4}}>
                <div className="field"><label>Calling Phone</label><input value={editData.callingPhone||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{callingPhone:e.target.value});})}}/></div>
                <div className="field"><label>PIN Code</label><input value={editData.deliveryPin||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{deliveryPin:e.target.value});})}}/></div>
                <div className="field" style={{gridColumn:"1/-1"}}><label>Address Line 1</label><input value={editData.deliveryLine1||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{deliveryLine1:e.target.value});})}}/></div>
                <div className="field" style={{gridColumn:"1/-1"}}><label>Address Line 2</label><input value={editData.deliveryLine2||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{deliveryLine2:e.target.value});})}}/></div>
                <div className="field"><label>City, State</label><input value={editData.deliveryCity||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{deliveryCity:e.target.value});})}}/></div>
                <div className="field"><label>Preferred Delivery Time</label><input value={editData.deliveryTime||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{deliveryTime:e.target.value});})}}/></div>
                <div className="field" style={{gridColumn:"1/-1"}}><label>Landmark</label><input value={editData.deliveryLandmark||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{deliveryLandmark:e.target.value});})}}/></div>
              </div>
            </div>}
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <button className="btn" onClick={function(){if(editData&&editData.name){updClient(editData.id,editData);setShowEdit(false);}}} style={{background:"#1C1917",color:"white",padding:"10px 18px",flex:1,fontWeight:600}}>Save</button>
              <button className="btn" onClick={function(){setShowEdit(false);}} style={{background:"#F5F3EE",color:"#57534E",padding:"10px 14px"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {showImport&&(
        <div className="overlay" onClick={function(){setShowImport(false);}}>
          <div className="modal fi" onClick={function(e){e.stopPropagation();}}>
            <h2 className="serif" style={{fontSize:20,marginBottom:8}}>Import from Google Sheets</h2>
            <p style={{fontSize:13,color:"#78716C",marginBottom:8}}>Run syncAllClients() in Apps Script, copy a CHUNK line, paste below.</p>
            <div style={{background:"#FFF8F0",border:"1px solid #FDE68A",borderRadius:10,padding:"10px 14px",marginBottom:10}}><p style={{fontSize:12,color:"#92400E"}}>Copy only the JSON part after CHUNK_0: - starts with [ ends with ]</p></div>
            <textarea placeholder="Paste JSON here..." value={importJson} onChange={function(e){setImportJson(e.target.value);}} rows={8} style={{fontSize:12,lineHeight:1.5,fontFamily:"monospace",marginBottom:10,background:"#FAFAF7"}}/>
            {importErr&&<p style={{fontSize:12,color:"#E11D48",marginBottom:10,background:"#FFF1F2",padding:"8px 12px",borderRadius:8}}>{importErr}</p>}
            <div style={{display:"flex",gap:8}}>
              <button className="btn" onClick={doImport} style={{background:"#16A34A",color:"white",padding:"10px 18px",flex:1,fontWeight:600}}>Import Now</button>
              <button className="btn" onClick={function(){setShowImport(false);}} style={{background:"#F5F3EE",color:"#57534E",padding:"10px 14px"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {showAdd&&(
        <div className="overlay" onClick={function(){setShowAdd(false);}}>
          <div className="modal fi" onClick={function(e){e.stopPropagation();}}>
            <h2 className="serif" style={{fontSize:20,marginBottom:14}}>Add New Client</h2>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div className="field" style={{gridColumn:"1/-1"}}><label>Full Name *</label><input value={newC.name} onChange={function(e){setNewC(function(p){return Object.assign({},p,{name:e.target.value});})}}/></div>
              <div className="field"><label>WhatsApp</label><input value={newC.phone} onChange={function(e){setNewC(function(p){return Object.assign({},p,{phone:e.target.value});})}}/></div>
              <div className="field"><label>Email</label><input value={newC.email} onChange={function(e){setNewC(function(p){return Object.assign({},p,{email:e.target.value});})}}/></div>
              <div className="field"><label>Health Goal</label><input value={newC.goal} onChange={function(e){setNewC(function(p){return Object.assign({},p,{goal:e.target.value});})}}/></div>
              <div className="field"><label>Plan</label><input value={newC.plan} onChange={function(e){setNewC(function(p){return Object.assign({},p,{plan:e.target.value});})}}/></div>
              <div className="field"><label>Preferred Date</label><input value={newC.prefDate} onChange={function(e){setNewC(function(p){return Object.assign({},p,{prefDate:e.target.value});})}}/></div>
              <div className="field"><label>Session Mode</label><select value={newC.sesMode} onChange={function(e){setNewC(function(p){return Object.assign({},p,{sesMode:e.target.value});});}}>
                <option>Online</option><option>In-person</option>
              </select></div>
              <div className="field"><label>Source</label><select value={newC.source} onChange={function(e){setNewC(function(p){return Object.assign({},p,{source:e.target.value});});}}>
                {["Instagram","WhatsApp","Email","Referral","Google Form","Other"].map(function(x){return <option key={x}>{x}</option>;})}
              </select></div>
              <div className="field"><label>Stage</label><select value={newC.stage} onChange={function(e){setNewC(function(p){return Object.assign({},p,{stage:e.target.value});});}}>
                {STAGES.map(function(x){return <option key={x}>{x}</option>;})}
              </select></div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <button className="btn" onClick={addCli} style={{background:"#1C1917",color:"white",padding:"10px 18px",flex:1,fontWeight:600}}>Add Client</button>
              <button className="btn" onClick={function(){setShowAdd(false);}} style={{background:"#F5F3EE",color:"#57534E",padding:"10px 14px"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
