<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Body Bio Balance Consultancy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F7F6F2;color:#1C1917}
.serif{font-family:'Cormorant Garamond',serif}
.btn{cursor:pointer;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .18s}
.btn:hover{filter:brightness(.92)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.card{background:white;border-radius:14px;border:1px solid #E8E5DF}
.tag{border-radius:20px;font-size:11px;font-weight:500;padding:3px 10px;display:inline-block}
.tab{padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all .18s;border:none;background:transparent;font-family:'DM Sans',sans-serif}
.tab.active{background:#1C1917;color:white}
.tab:not(.active){color:#78716C}
.tab:not(.active):hover{background:#EFEDE8}
input,textarea,select{font-family:'DM Sans',sans-serif;font-size:13px;border:1px solid #E8E5DF;border-radius:8px;padding:9px 12px;width:100%;outline:none;background:white;color:#1C1917}
input:focus,textarea:focus,select:focus{border-color:#92400E}
.crow{padding:12px 16px;border-radius:10px;cursor:pointer;transition:background .15s;border:1.5px solid transparent}
.crow:hover{background:#F5F3EE}
.crow.sel{background:#FFF8F0;border-color:#F59E0B}
.scroll{overflow-y:auto}
.scroll::-webkit-scrollbar{width:4px}
.scroll::-webkit-scrollbar-thumb{background:#D6D3D1;border-radius:4px}
.chbtn{padding:7px 14px;border-radius:8px;border:1.5px solid #E8E5DF;cursor:pointer;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;background:white}
.chbtn.active{border-color:#92400E;background:#FFF8F0;color:#92400E}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.aibtn{background:linear-gradient(135deg,#7C3AED,#A855F7);color:white;padding:9px 18px;border-radius:9px;border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.aibtn:disabled{opacity:.6;cursor:not-allowed}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:white;border-radius:18px;padding:28px;width:580px;max-width:100%;max-height:90vh;overflow-y:auto}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeIn .25s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 1.2s infinite}
.pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
.code{background:#1C1917;color:#FDE68A;border-radius:10px;padding:14px;font-size:11px;font-family:monospace;white-space:pre-wrap;line-height:1.6}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

var useState = React.useState;
var useEffect = React.useEffect;

var STAGES = ["New Inquiry","Booked","Intake Sent","Active Client","Follow-up"];

var SC = {
  "New Inquiry":   {bg:"#FFF4E6", accent:"#F97316", dot:"#F97316"},
  "Booked":        {bg:"#EFF6FF", accent:"#3B82F6", dot:"#3B82F6"},
  "Intake Sent":   {bg:"#F0FDF4", accent:"#16A34A", dot:"#16A34A"},
  "Active Client": {bg:"#FAF5FF", accent:"#9333EA", dot:"#9333EA"},
  "Follow-up":     {bg:"#FFF1F2", accent:"#E11D48", dot:"#E11D48"}
};

var TEMPLATES = {
  "New Inquiry": {
    whatsapp: "Hi [Name]! Thank you for reaching out. I'm Taniya, a Certified Diabetes Educator and Nutritionist. I'd love to learn about your health goals. Could you share what you're looking for? I'll send my availability for a free 15-min discovery call.",
    email: {
      subject: "Thank you for reaching out - Let's talk nutrition!",
      body: "Hi [Name],\n\nThank you for getting in touch! I'm thrilled you're taking this step toward your health goals.\n\nI'd love to schedule a quick 15-minute discovery call to understand your needs.\n\nPlease reply with your preferred time slot, or use my booking link: [BOOKING LINK]\n\nLooking forward to connecting!\n\nWarm regards,\nTaniya\nCertified Diabetes Educator | M.Sc. Applied Nutrition"
    },
    instagram: "Hi [Name]! Thank you for your message. I'd love to help you on your wellness journey. Drop me your email and I'll send all the details about booking your free discovery call!"
  },
  "Booked": {
    whatsapp: "Hi [Name]! Your appointment is confirmed!\n\nDate: [DATE]\nTime: [TIME]\nPlatform: [Zoom/Google Meet]\n\nPlease fill out your intake form before our call: [FORM LINK]\n\nSee you soon!",
    email: {
      subject: "Your appointment is confirmed",
      body: "Hi [Name],\n\nYour session with me is officially confirmed!\n\nDate: [DATE]\nTime: [TIME]\nPlatform: [LINK]\n\nBefore our session, please fill out your intake form:\n[INTAKE FORM LINK]\n\nIf you need to reschedule, please let me know at least 24 hours in advance.\n\nSee you soon!\nTaniya"
    },
    instagram: "Your booking is confirmed, [Name]! Check your email for all the details and your intake form link. Can't wait to work together!"
  },
  "Intake Sent": {
    whatsapp: "Hi [Name]! Just a gentle reminder to fill out your intake form before our session.\n\n[FORM LINK]\n\nIt only takes about 10 minutes and helps me create the most personalised plan for you!",
    email: {
      subject: "Reminder: Please complete your intake form",
      body: "Hi [Name],\n\nJust a friendly reminder that your intake form is waiting for you!\n\nComplete your form here: [FORM LINK]\n\nOur session is on [DATE] at [TIME] - looking forward to it!\n\nWarm regards,\nTaniya"
    },
    instagram: "Hey [Name]! Don't forget to fill out your intake form. Check your email for the link - it only takes 10 minutes!"
  },
  "Active Client": {
    whatsapp: "Hi [Name]! Hope you're doing well. Just checking in on how your meal plan is going this week. Any wins or challenges to share?",
    email: {
      subject: "Weekly check-in - How are you feeling?",
      body: "Hi [Name],\n\nHope this week has been treating you well! I'm checking in to see how your nutrition plan is going.\n\n- How are your energy levels?\n- Finding the meal plan easy to follow?\n- Any symptoms or changes worth noting?\n\nReply anytime - I'm here to support you!\n\nWarm regards,\nTaniya"
    },
    instagram: "Checking in on you [Name]! How's your wellness journey going this week? DM me anytime if you need support!"
  },
  "Follow-up": {
    whatsapp: "Hi [Name]! It's been a while. How are you doing with your health goals? Would you be open to a quick check-in call?",
    email: {
      subject: "Checking in on your wellness journey",
      body: "Hi [Name],\n\nI hope you're doing wonderfully! It's been some time since we last connected.\n\nI have a few spots open this month if you'd like to reconnect: [BOOKING LINK]\n\nEither way, I'm rooting for you!\n\nWarm regards,\nTaniya\nCertified Diabetes Educator | M.Sc. Applied Nutrition"
    },
    instagram: "Hey [Name]! Thinking of you and your health journey. Would love to reconnect - DM me!"
  }
};

var CHECKLIST = {
  "New Inquiry":   ["Reply within 2 hours","Send discovery call link","Log client source","Add to pipeline"],
  "Booked":        ["Send confirmation message","Add to Google Calendar","Share intake form link","Set 24hr reminder"],
  "Intake Sent":   ["Review intake form before session","Prepare personalised notes","Send reminder if not submitted 24hrs prior","Check for medical flags"],
  "Active Client": ["Weekly check-in sent","Meal plan reviewed","Session notes updated","Next appointment booked"],
  "Follow-up":     ["Send re-engagement message","Note last interaction date","Offer returning client discount","Update pipeline status"]
};

function getPlan(row) {
  var plans = [
    {s:"1:1 Nutrition Consultation", t:"New Client", k:"🌱Choose your 1:1 Nutrition Consultation plan"},
    {s:"1:1 Nutrition Consultation", t:"Returning/Referred", k:"🌿Choose your 1:1 Nutrition Consultation plan"},
    {s:"Habit Building Program", t:"New Client", k:"🌱Choose your Habit Building Program plan"},
    {s:"Habit Building Program", t:"Returning/Referred", k:"🌿Choose your Habit Building plan"},
    {s:"Metabolic Reset", t:"New Client", k:"🌱Choose your Metabolic Reset plan"},
    {s:"Metabolic Reset", t:"Returning/Referred", k:"🌿Choose your Metabolic Reset plan"},
    {s:"Homemaker Family Nutrition", t:"New Client", k:"🌱Choose your Homemaker's Family plan"},
    {s:"Homemaker Family Nutrition", t:"Returning/Referred", k:"🌿Choose your Homemaker's Family plan"}
  ];
  for (var i = 0; i < plans.length; i++) {
    if (row[plans[i].k]) return {plan: row[plans[i].k], service: plans[i].s, ct: plans[i].t};
  }
  var hasRet = !!row["🌿Which service would you like to book?"];
  return {
    plan: "",
    service: row["🌱Which service would you like to book?"] || row["🌿Which service would you like to book?"] || "",
    ct: hasRet ? "Returning/Referred" : "New Client"
  };
}

function genCode(clients, date) {
  var d = date ? new Date(date) : new Date();
  var yy = String(d.getFullYear()).slice(-2);
  var mm = String(d.getMonth() + 1).padStart(2, "0");
  var ex = clients.filter(function(c) {
    return c.cc && c.cc.startsWith(yy) && c.cc.slice(3,5) === mm;
  });
  var serial = ex.length + 1;
  var batch = Math.floor((serial - 1) / 100);
  var rem = batch === 0 ? serial : (serial - 1) % 100;
  return yy + batch + mm + String(rem).padStart(2, "0");
}

function parseRow(row) {
  var p = getPlan(row);
  var dateStr = "";
  if (row["Timestamp"]) {
    try { dateStr = new Date(row["Timestamp"]).toLocaleDateString("en-US", {month:"short", day:"numeric"}); } catch(e) { dateStr = ""; }
  }
  if (!dateStr) dateStr = new Date().toLocaleDateString("en-US", {month:"short", day:"numeric"});
  return {
    id: Date.now() + Math.random(),
    name: row["Name"] || "Unknown",
    email: row["Email Address"] || "",
    phone: String(row["Phone Number (preferably WhatsApp)"] || ""),
    dob: row["Date of Birth"] || "",
    gender: row["Gender"] || "",
    city: row["City /Location"] || "",
    workedBefore: row["Have you worked with me before?"] || "",
    lastProgram: row["🌿Which program did we last work on together?"] || "",
    progress: row["🌿How has your progress been since we last worked together? "] || "",
    prevNutri: row["🌱Have you worked with a nutritionist or dietitian before? "] || "",
    source: row["🌱How did you hear about me?"] || "Form",
    refCode: row["🌿Please enter your referral/ client code"] || "",
    service: p.service,
    plan: p.plan,
    ct: p.ct,
    goal: row["What are your primary health goals or concerns?"] || "",
    conditions: row["Do you have any existing health conditions? (Select all that apply)"] || "",
    onMed: row["Are you currently on any medication?"] || "",
    meds: row["Name of Medicines taken and its doses."] || "",
    sesMode: row["How would you like to attend your session?"] || "",
    prefWE: row["Preferred Slot [Weekend]"] || "",
    prefWD: row["Preferred Slot [Weekdays]"] || "",
    prefDate: row["Preferred Date"] || "",
    extraNotes: row["Anything else you'd like me to know before your session? "] || "",
    labs: row["Please upload your latest blood reports or doctor's prescription for reference."] || "",
    stage: "New Inquiry",
    cc: "",
    date: dateStr
  };
}

function assignCodes(clients) {
  var sorted = clients.slice().sort(function(a,b) { return new Date(a.date) - new Date(b.date); });
  var used = {};
  return sorted.map(function(c) {
    if (c.cc) { used[c.cc] = 1; return c; }
    var code = genCode(Object.keys(used).map(function(k) { return {cc:k}; }), c.date);
    used[code] = 1;
    return Object.assign({}, c, {cc: code});
  });
}

function App() {
  var s1 = useState([]); var clients = s1[0]; var setClients = s1[1];
  var s2 = useState(null); var sel = s2[0]; var setSel = s2[1];
  var s3 = useState("pipeline"); var tab = s3[0]; var setTab = s3[1];
  var s4 = useState("whatsapp"); var ch = s4[0]; var setCh = s4[1];
  var s5 = useState(""); var copied = s5[0]; var setCopied = s5[1];
  var s6 = useState({}); var checked = s6[0]; var setChecked = s6[1];
  var s7 = useState(false); var showAdd = s7[0]; var setShowAdd = s7[1];
  var s8 = useState(false); var showImport = s8[0]; var setShowImport = s8[1];
  var s9 = useState(false); var aiLoad = s9[0]; var setAiLoad = s9[1];
  var s10 = useState(""); var aiMsg = s10[0]; var setAiMsg = s10[1];
  var s11 = useState(""); var aiP = s11[0]; var setAiP = s11[1];
  var s12 = useState(""); var search = s12[0]; var setSearch = s12[1];
  var s13 = useState("All"); var fStage = s13[0]; var setFStage = s13[1];
  var s14 = useState(""); var syncSt = s14[0]; var setSyncSt = s14[1];
  var s15 = useState(""); var importJson = s15[0]; var setImportJson = s15[1];
  var s16 = useState(""); var importErr = s16[0]; var setImportErr = s16[1];
  var s17 = useState({name:"",stage:"New Inquiry",source:"Instagram",goal:"",phone:"",email:"",conditions:"",meds:"",notes:""}); var newC = s17[0]; var setNewC = s17[1];

  useEffect(function() {
    try { var d = localStorage.getItem("bbb_c"); if(d) setClients(JSON.parse(d)); } catch(e) {}
    try { var d2 = localStorage.getItem("bbb_ch"); if(d2) setChecked(JSON.parse(d2)); } catch(e) {}
  }, []);

  useEffect(function() {
    try { localStorage.setItem("bbb_c", JSON.stringify(clients)); } catch(e) {}
  }, [clients]);

  useEffect(function() {
    try { localStorage.setItem("bbb_ch", JSON.stringify(checked)); } catch(e) {}
  }, [checked]);

  useEffect(function() {
    window.__receiveSheetData = function(rows) {
      var incoming = rows.map(parseRow);
      setClients(function(prev) {
        var em = new Set(prev.map(function(c) { return (c.email || "").toLowerCase(); }));
        var fresh = incoming.filter(function(c) { return !em.has((c.email || "").toLowerCase()); });
        if (!fresh.length) { setSyncSt("No new clients found"); setTimeout(function(){setSyncSt("");}, 3000); return prev; }
        setSyncSt(fresh.length + " client(s) imported!");
        setTimeout(function(){setSyncSt("");}, 5000);
        return assignCodes(prev.concat(fresh));
      });
    };
    return function() { delete window.__receiveSheetData; };
  }, []);

  var filtered = clients.filter(function(c) {
    return (fStage === "All" || c.stage === fStage) &&
      (c.name.toLowerCase().includes(search.toLowerCase()) || (c.goal||"").toLowerCase().includes(search.toLowerCase()));
  });

  function cnt(stage) { return clients.filter(function(c) { return c.stage === stage; }).length; }

  function getTpl(stage, channel) {
    var t = TEMPLATES[stage];
    if (!t) return "";
    if (channel === "email") return "Subject: " + t.email.subject + "\n\n" + t.email.body;
    return t[channel] || "";
  }

  function pers(tpl, client) {
    if (!client) return tpl;
    return tpl.replace(/\[Name\]/g, client.name.split(" ")[0]);
  }

  function copy(text, label) {
    navigator.clipboard.writeText(text);
    setCopied(label);
    setTimeout(function(){setCopied("");}, 2000);
  }

  function move(client, dir) {
    var idx = STAGES.indexOf(client.stage);
    var next = STAGES[idx + dir];
    if (!next) return;
    setClients(function(p) { return p.map(function(c) { return c.id === client.id ? Object.assign({},c,{stage:next}) : c; }); });
    setSel(function(p) { return p && p.id === client.id ? Object.assign({},p,{stage:next}) : p; });
  }

  function addClient() {
    if (!newC.name) return;
    var ds = new Date().toLocaleDateString("en-US", {month:"short", day:"numeric"});
    setClients(function(prev) {
      var code = genCode(prev, new Date());
      var ct = newC.source === "Referral" ? "Returning/Referred" : "New Client";
      return prev.concat([Object.assign({}, newC, {id: Date.now(), date: ds, cc: code, ct: ct})]);
    });
    setShowAdd(false);
    setNewC({name:"",stage:"New Inquiry",source:"Instagram",goal:"",phone:"",email:"",conditions:"",meds:"",notes:""});
  }

  function doImport() {
    setImportErr("");
    if (!importJson.trim()) { setImportErr("Please paste your JSON data first."); return; }
    try {
      var rows = JSON.parse(importJson.trim());
      if (!Array.isArray(rows)) { setImportErr("Invalid format. Must be a JSON array."); return; }
      var incoming = rows.map(parseRow);
      setClients(function(prev) {
        var em = new Set(prev.map(function(c) { return (c.email||"").toLowerCase(); }));
        var fresh = incoming.filter(function(c) { return !em.has((c.email||"").toLowerCase()); });
        if (!fresh.length) { setSyncSt("No new clients found"); setTimeout(function(){setSyncSt("");},3000); setShowImport(false); return prev; }
        setSyncSt(fresh.length + " client(s) imported!");
        setTimeout(function(){setSyncSt("");}, 5000);
        setShowImport(false);
        setImportJson("");
        return assignCodes(prev.concat(fresh));
      });
    } catch(e) {
      setImportErr("Could not parse JSON. Error: " + e.message);
    }
  }

  async function genAi() {
    if (!sel || !aiP.trim()) return;
    setAiLoad(true); setAiMsg("");
    try {
      var res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: "You are Taniya, a Certified Diabetes Educator and Nutritionist with an M.Sc. in Applied Nutrition and 10 years of expertise. Write warm, professional, empathetic client messages. Be concise and encouraging. Sign off as Taniya.",
          messages: [{role:"user", content:"Client: " + sel.name + ". Stage: " + sel.stage + ". Goal: " + sel.goal + ". Conditions: " + sel.conditions + ". Medications: " + sel.meds + ". Channel: " + ch + ". Task: " + aiP}]
        })
      });
      var data = await res.json();
      var txt = data.content && data.content.find(function(b){return b.type==="text";});
      setAiMsg(txt ? txt.text : "Could not generate message.");
    } catch(e) { setAiMsg("Error generating message. Please try again."); }
    setAiLoad(false);
  }

  var syncScript = 'function syncAllClients() {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();\n  var data = sheet.getDataRange().getValues();\n  var headers = data[0];\n  var rows = data.slice(1).map(function(row) {\n    var obj = {};\n    headers.forEach(function(h,i){ obj[h] = row[i]; });\n    return obj;\n  });\n  Logger.log(JSON.stringify(rows));\n}';

  return (
    <div style={{fontFamily:"'DM Sans',sans-serif", background:"#F7F6F2", minHeight:"100vh"}}>

      <div style={{background:"#1C1917", color:"white", padding:"18px 28px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12}}>
        <div>
          <h1 className="serif" style={{fontSize:26, fontWeight:600, color:"#FDE68A"}}>Body Bio Balance Consultancy</h1>
          <p style={{fontSize:12, color:"#A8A29E", marginTop:2}}>Client Management Hub</p>
        </div>
        <div style={{display:"flex", gap:8, alignItems:"center", flexWrap:"wrap"}}>
          {syncSt && <span style={{background:"#166534", color:"#BBF7D0", padding:"6px 14px", borderRadius:8, fontSize:12}}>{syncSt}</span>}
          <div style={{background:"#292524", borderRadius:10, padding:"8px 14px", fontSize:12}}>
            <span style={{color:"#A8A29E"}}>Active: </span>
            <span style={{color:"#FDE68A", fontWeight:600}}>{cnt("Active Client")}</span>
          </div>
          <div style={{background:"#292524", borderRadius:10, padding:"8px 14px", fontSize:12}}>
            <span style={{color:"#A8A29E"}}>Total: </span>
            <span style={{color:"#FDE68A", fontWeight:600}}>{clients.length}</span>
          </div>
          <button className="btn" onClick={function(){setShowImport(true);setImportErr("");setImportJson("");}} style={{background:"#16A34A", color:"white", padding:"9px 16px", fontWeight:600}}>
            Import Clients
          </button>
          <button className="btn" onClick={function(){setShowAdd(true);}} style={{background:"#F59E0B", color:"#1C1917", padding:"9px 16px", fontWeight:600}}>
            + Add Client
          </button>
        </div>
      </div>

      <div style={{padding:"14px 28px 0", display:"flex", gap:4, borderBottom:"1px solid #E8E5DF", background:"white", overflowX:"auto"}}>
        {[["pipeline","Pipeline"],["templates","Templates"],["checklist","Checklist"],["ai-compose","AI Compose"],["profile","Full Profile"]].map(function(item) {
          return <button key={item[0]} className={"tab" + (tab===item[0] ? " active" : "")} onClick={function(){setTab(item[0]);}}>{item[1]}</button>;
        })}
      </div>

      <div style={{padding:"20px 28px", display:"flex", gap:20, alignItems:"flex-start"}}>

        <div className="card" style={{width:280, flexShrink:0}}>
          <div style={{padding:"14px 16px", borderBottom:"1px solid #F5F3EE"}}>
            <input placeholder="Search clients..." value={search} onChange={function(e){setSearch(e.target.value);}} style={{marginBottom:8}}/>
            <select value={fStage} onChange={function(e){setFStage(e.target.value);}}>
              <option>All</option>
              {STAGES.map(function(s){return <option key={s}>{s}</option>;})}
            </select>
          </div>
          <div className="scroll" style={{maxHeight:520}}>
            {filtered.length === 0 &&
              <div style={{padding:24, textAlign:"center"}}>
                <p style={{color:"#A8A29E", fontSize:13}}>No clients yet</p>
                <p style={{color:"#D6D3D1", fontSize:11, marginTop:4}}>Add manually or import from Sheets</p>
              </div>
            }
            {filtered.map(function(c) {
              return (
                <div key={c.id} className={"crow" + (sel && sel.id===c.id ? " sel" : "")} onClick={function(){setSel(c);setAiMsg("");setAiP("");}}>
                  <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start"}}>
                    <div>
                      <div style={{display:"flex", alignItems:"center", gap:6}}>
                        <p style={{fontWeight:500, fontSize:14}}>{c.name}</p>
                        {c.cc && <span style={{fontSize:10, fontFamily:"monospace", color:"#A8A29E", background:"#F5F3EE", borderRadius:4, padding:"1px 6px"}}>#{c.cc}</span>}
                      </div>
                      <p style={{fontSize:11, color:"#78716C", marginTop:2}}>{c.goal || "No goal specified"}</p>
                    </div>
                    <span className="tag" style={{background:SC[c.stage] && SC[c.stage].bg, color:SC[c.stage] && SC[c.stage].accent, fontSize:10}}>{c.stage}</span>
                  </div>
                  <div style={{display:"flex", gap:10, marginTop:6, fontSize:11, color:"#A8A29E"}}>
                    <span>{c.source}</span>
                    <span>{c.date}</span>
                    {c.ct && <span>{c.ct === "New Client" ? "New" : "Returning"}</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div style={{flex:1, minWidth:0}}>
          {!sel &&
            <div className="card" style={{padding:48, textAlign:"center"}}>
              <p className="serif" style={{fontSize:24, color:"#A8A29E", fontStyle:"italic"}}>Select a client to begin</p>
              <p style={{fontSize:13, color:"#D6D3D1", marginTop:8}}>or import from Google Sheets</p>
            </div>
          }

          {sel && (function() {
            var s = sel;
            var color = SC[s.stage] || SC["New Inquiry"];
            return (
              <div className="fi">
                <div className="card" style={{padding:"16px 22px", marginBottom:14, display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12, background:color.bg, borderColor:color.accent + "50"}}>
                  <div>
                    <div style={{display:"flex", alignItems:"center", gap:12}}>
                      <h2 className="serif" style={{fontSize:22, fontWeight:600}}>{s.name}</h2>
                      {s.cc && <span style={{background:"#1C1917", color:"#FDE68A", borderRadius:8, padding:"3px 10px", fontSize:12, fontWeight:700, fontFamily:"monospace"}}>#{s.cc}</span>}
                    </div>
                    <div style={{display:"flex", gap:14, marginTop:5, fontSize:12, color:"#57534E", flexWrap:"wrap"}}>
                      {s.goal && <span>{s.goal}</span>}
                      {s.phone && <span>{s.phone}</span>}
                      {s.email && <span>{s.email}</span>}
                    </div>
                    {s.plan && <p style={{marginTop:5, fontSize:12, color:"#92400E", fontWeight:500}}>{s.plan} ({s.ct})</p>}
                    {s.conditions && <p style={{marginTop:4, fontSize:12, color:"#78716C", fontStyle:"italic"}}>{s.conditions}</p>}
                    {s.meds && <p style={{marginTop:3, fontSize:12, color:"#78716C", fontStyle:"italic"}}>{s.meds}</p>}
                  </div>
                  <div style={{display:"flex", flexDirection:"column", alignItems:"flex-end", gap:8}}>
                    <span className="pill" style={{background:color.accent, color:"white"}}>{s.stage}</span>
                    <div style={{display:"flex", gap:6}}>
                      <button className="btn" onClick={function(){move(s,-1);}} disabled={STAGES.indexOf(s.stage)===0} style={{background:"white", border:"1px solid #E8E5DF", padding:"5px 12px", fontSize:11, color:"#57534E"}}>Back</button>
                      <button className="btn" onClick={function(){move(s,1);}} disabled={STAGES.indexOf(s.stage)===STAGES.length-1} style={{background:color.accent, color:"white", padding:"5px 12px", fontSize:11}}>Next Stage</button>
                    </div>
                  </div>
                </div>

                {tab === "pipeline" &&
                  <div className="card" style={{padding:20}}>
                    <h3 className="serif" style={{fontSize:18, marginBottom:16}}>Journey Pipeline</h3>
                    <div style={{display:"flex", gap:10, overflowX:"auto", paddingBottom:8}}>
                      {STAGES.map(function(stage, i) {
                        var isCur = s.stage === stage;
                        var isDone = i < STAGES.indexOf(s.stage);
                        return (
                          <div key={stage} style={{flex:"1 0 110px"}}>
                            <div style={{display:"flex", alignItems:"center", gap:6, marginBottom:8}}>
                              <span className="dot" style={{background:SC[stage].dot}}></span>
                              <p style={{fontSize:10, fontWeight:600, color:"#57534E", textTransform:"uppercase", letterSpacing:".05em", lineHeight:1.3}}>{stage}</p>
                            </div>
                            <div style={{padding:"10px 12px", borderRadius:10, background:SC[stage].bg, border:"1.5px solid " + (isCur ? SC[stage].accent : "transparent"), minHeight:56}}>
                              {isCur
                                ? <div><p style={{fontSize:13, fontWeight:600}}>{s.name.split(" ")[0]}</p><p style={{fontSize:11, color:"#78716C", marginTop:2}}>{s.date}</p></div>
                                : <p style={{fontSize:11, color: isDone ? "#22C55E" : "#D6D3D1", fontStyle:"italic"}}>{isDone ? "Done" : "Upcoming"}</p>
                              }
                            </div>
                            <p style={{fontSize:10, color:"#A8A29E", textAlign:"center", marginTop:4}}>{cnt(stage)} total</p>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                }

                {tab === "templates" &&
                  <div className="card" style={{padding:20}}>
                    <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:10}}>
                      <h3 className="serif" style={{fontSize:18}}>Templates</h3>
                      <div style={{display:"flex", gap:6}}>
                        {["whatsapp","email","instagram"].map(function(c) {
                          return <button key={c} className={"chbtn" + (ch===c?" active":"")} onClick={function(){setCh(c);}}>{c==="whatsapp"?"WhatsApp":c==="email"?"Email":"Instagram"}</button>;
                        })}
                      </div>
                    </div>
                    <div style={{position:"relative"}}>
                      <textarea value={pers(getTpl(s.stage, ch), s)} readOnly rows={ch==="email" ? 12 : 7} style={{fontSize:13, lineHeight:1.75, background:"#FAFAF7", resize:"none", color:"#292524"}}/>
                      <button className="btn" onClick={function(){copy(pers(getTpl(s.stage,ch),s),"tpl");}} style={{position:"absolute", top:10, right:10, background:"#1C1917", color:"white", padding:"6px 14px"}}>
                        {copied==="tpl" ? "Copied!" : "Copy"}
                      </button>
                    </div>
                    <div style={{marginTop:12, display:"flex", gap:8, flexWrap:"wrap"}}>
                      {ch==="whatsapp" && s.phone &&
                        <a href={"https://wa.me/" + s.phone.replace(/\D/g,"") + "?text=" + encodeURIComponent(pers(TEMPLATES[s.stage] && TEMPLATES[s.stage].whatsapp || "", s))} target="_blank" rel="noopener noreferrer" style={{background:"#22C55E", color:"white", padding:"8px 16px", borderRadius:8, fontSize:12, fontWeight:500, textDecoration:"none"}}>
                          Open in WhatsApp
                        </a>
                      }
                      {ch==="email" && s.email &&
                        <a href={"mailto:" + s.email + "?subject=" + encodeURIComponent((TEMPLATES[s.stage] && TEMPLATES[s.stage].email && TEMPLATES[s.stage].email.subject) || "") + "&body=" + encodeURIComponent(pers((TEMPLATES[s.stage] && TEMPLATES[s.stage].email && TEMPLATES[s.stage].email.body) || "", s))} style={{background:"#3B82F6", color:"white", padding:"8px 16px", borderRadius:8, fontSize:12, fontWeight:500, textDecoration:"none"}}>
                          Open in Mail
                        </a>
                      }
                    </div>
                  </div>
                }

                {tab === "checklist" &&
                  <div className="card" style={{padding:20}}>
                    <h3 className="serif" style={{fontSize:18, marginBottom:4}}>Checklist</h3>
                    <p style={{fontSize:12, color:"#A8A29E", marginBottom:16}}>Tasks before moving {s.name.split(" ")[0]} to the next stage</p>
                    {(CHECKLIST[s.stage] || []).map(function(item) {
                      var key = s.id + "-" + item;
                      var done = checked[key];
                      return (
                        <div key={item} style={{display:"flex", alignItems:"center", gap:10, padding:"9px 0", borderBottom:"1px solid #F5F3EE"}}>
                          <div onClick={function(){setChecked(function(p){var n=Object.assign({},p);n[key]=!p[key];return n;});}} style={{width:20, height:20, borderRadius:6, border:"2px solid " + (done ? color.accent : "#D6D3D1"), background: done ? color.accent : "white", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0}}>
                            {done && <span style={{color:"white", fontSize:11, fontWeight:700}}>v</span>}
                          </div>
                          <p style={{fontSize:13, textDecoration: done ? "line-through" : "none", color: done ? "#A8A29E" : "#292524"}}>{item}</p>
                        </div>
                      );
                    })}
                    <div style={{marginTop:14, padding:"10px 14px", background:"#F5F3EE", borderRadius:10}}>
                      <p style={{fontSize:12, color:"#78716C"}}>
                        {(CHECKLIST[s.stage]||[]).filter(function(item){return checked[s.id+"-"+item];}).length} / {(CHECKLIST[s.stage]||[]).length} completed
                      </p>
                    </div>
                  </div>
                }

                {tab === "ai-compose" &&
                  <div className="card" style={{padding:20}}>
                    <h3 className="serif" style={{fontSize:18, marginBottom:4}}>AI Compose</h3>
                    <p style={{fontSize:12, color:"#A8A29E", marginBottom:14}}>Generate a personalised message for {s.name.split(" ")[0]}</p>
                    <div style={{display:"flex", gap:6, marginBottom:12}}>
                      {["whatsapp","email","instagram"].map(function(c){
                        return <button key={c} className={"chbtn"+(ch===c?" active":"")} onClick={function(){setCh(c);}}>{c==="whatsapp"?"WhatsApp":c==="email"?"Email":"Instagram"}</button>;
                      })}
                    </div>
                    <textarea placeholder="e.g. Follow up on her diabetes meal plan and encourage booking next session" value={aiP} onChange={function(e){setAiP(e.target.value);}} rows={3} style={{marginBottom:10, lineHeight:1.6}}/>
                    <button className="aibtn" onClick={genAi} disabled={aiLoad || !aiP.trim()}>
                      {aiLoad ? <span className="pulse">Generating...</span> : "Generate Message"}
                    </button>
                    {aiMsg &&
                      <div className="fi" style={{marginTop:16, position:"relative"}}>
                        <div style={{background:"#FAF5FF", border:"1px solid #E9D5FF", borderRadius:10, padding:16}}>
                          <pre style={{fontFamily:"'DM Sans',sans-serif", fontSize:13, lineHeight:1.75, whiteSpace:"pre-wrap", color:"#292524"}}>{aiMsg}</pre>
                        </div>
                        <button className="btn" onClick={function(){copy(aiMsg,"ai");}} style={{position:"absolute", top:10, right:10, background:"#7C3AED", color:"white", padding:"5px 12px", fontSize:11}}>
                          {copied==="ai" ? "Copied!" : "Copy"}
                        </button>
                      </div>
                    }
                  </div>
                }

                {tab === "profile" &&
                  <div className="card" style={{padding:20}}>
                    <h3 className="serif" style={{fontSize:18, marginBottom:16}}>Full Client Profile</h3>
                    {[
                      ["Personal Details", "#FAFAF7", "#E8E5DF", "#A8A29E", [["Client Code",s.cc],["Full Name",s.name],["Email",s.email],["WhatsApp",s.phone],["Date of Birth",s.dob],["Gender",s.gender],["City",s.city],["Source",s.source],["Added On",s.date]]],
                      ["Booking Details", "#FAFAF7", "#E8E5DF", "#A8A29E", [["Service",s.service],["Client Type",s.ct],["Selected Plan",s.plan],["Referral Code",s.refCode],["Session Mode",s.sesMode],["Preferred Date",s.prefDate],["Weekend Slot",s.prefWE],["Weekday Slot",s.prefWD]]],
                      ["Health Information", "#FFF8F0", "#FDE68A", "#92400E", [["Health Goals",s.goal],["Medical Conditions",s.conditions],["On Medication?",s.onMed],["Medications",s.meds],["Lab Reports",s.labs],["Prev Nutritionist?",s.prevNutri]]],
                      ["History & Notes", "#F0FDF4", "#BBF7D0", "#166534", [["Worked Before?",s.workedBefore],["Last Program",s.lastProgram],["Progress",s.progress],["Extra Notes",s.extraNotes]]]
                    ].map(function(section) {
                      var title=section[0], bg=section[1], border=section[2], lc=section[3], fields=section[4];
                      var vis = fields.filter(function(f){return f[1];});
                      if (!vis.length) return null;
                      return (
                        <div key={title} style={{marginBottom:18}}>
                          <p style={{fontSize:10, fontWeight:600, color:"#A8A29E", textTransform:"uppercase", letterSpacing:".08em", marginBottom:10}}>{title}</p>
                          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
                            {vis.map(function(f) {
                              return (
                                <div key={f[0]} style={{background:bg, borderRadius:10, padding:"12px 14px", border:"1px solid " + border}}>
                                  <p style={{fontSize:10, fontWeight:600, color:lc, textTransform:"uppercase", letterSpacing:".05em", marginBottom:4}}>{f[0]}</p>
                                  <p style={{fontSize:13, color:"#1C1917", lineHeight:1.5}}>{String(f[1])}</p>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                }

              </div>
            );
          })()}
        </div>
      </div>

      {showAdd &&
        <div className="overlay" onClick={function(){setShowAdd(false);}}>
          <div className="modal fi" onClick={function(e){e.stopPropagation();}}>
            <h2 className="serif" style={{fontSize:22, marginBottom:18}}>Add New Client</h2>
            <div style={{display:"flex", flexDirection:"column", gap:10}}>
              <input placeholder="Full Name *" value={newC.name} onChange={function(e){setNewC(function(p){return Object.assign({},p,{name:e.target.value});});}}/>
              <input placeholder="Health Goal" value={newC.goal} onChange={function(e){setNewC(function(p){return Object.assign({},p,{goal:e.target.value});});}}/>
              <input placeholder="WhatsApp Number" value={newC.phone} onChange={function(e){setNewC(function(p){return Object.assign({},p,{phone:e.target.value});});}}/>
              <input placeholder="Email" value={newC.email} onChange={function(e){setNewC(function(p){return Object.assign({},p,{email:e.target.value});});}}/>
              <input placeholder="Medical Conditions" value={newC.conditions} onChange={function(e){setNewC(function(p){return Object.assign({},p,{conditions:e.target.value});});}}/>
              <input placeholder="Current Medications" value={newC.meds} onChange={function(e){setNewC(function(p){return Object.assign({},p,{meds:e.target.value});});}}/>
              <div style={{display:"flex", gap:10}}>
                <select value={newC.source} onChange={function(e){setNewC(function(p){return Object.assign({},p,{source:e.target.value});});}}>
                  {["Instagram","WhatsApp","Email","Referral","Google Form","Other"].map(function(x){return <option key={x}>{x}</option>;})}
                </select>
                <select value={newC.stage} onChange={function(e){setNewC(function(p){return Object.assign({},p,{stage:e.target.value});});}}>
                  {STAGES.map(function(x){return <option key={x}>{x}</option>;})}
                </select>
              </div>
              <textarea placeholder="Additional notes..." value={newC.notes} onChange={function(e){setNewC(function(p){return Object.assign({},p,{notes:e.target.value});});}} rows={2}/>
            </div>
            <div style={{display:"flex", gap:10, marginTop:20}}>
              <button className="btn" onClick={addClient} style={{background:"#1C1917", color:"white", padding:"10px 22px", flex:1}}>Add Client</button>
              <button className="btn" onClick={function(){setShowAdd(false);}} style={{background:"#F5F3EE", color:"#57534E", padding:"10px 22px"}}>Cancel</button>
            </div>
          </div>
        </div>
      }

      {showImport &&
        <div className="overlay" onClick={function(){setShowImport(false);}}>
          <div className="modal fi" onClick={function(e){e.stopPropagation();}}>
            <h2 className="serif" style={{fontSize:22, marginBottom:8}}>Import Clients from Google Sheets</h2>
            <p style={{fontSize:13, color:"#78716C", marginBottom:8, lineHeight:1.6}}>
              Run <strong>syncAllClients()</strong> in Apps Script, then open the Execution Log, copy the JSON output and paste it below.
            </p>
            <div style={{background:"#FFF8F0", border:"1px solid #FDE68A", borderRadius:10, padding:"10px 14px", marginBottom:14}}>
              <p style={{fontSize:12, color:"#92400E", lineHeight:1.7}}>
                Steps: Apps Script → run syncAllClients() → View → Logs → copy the long line starting with [ → paste below
              </p>
            </div>
            <textarea
              placeholder="Paste your JSON data here..."
              value={importJson}
              onChange={function(e){setImportJson(e.target.value);}}
              rows={10}
              style={{fontSize:12, lineHeight:1.5, fontFamily:"monospace", marginBottom:10, background:"#FAFAF7"}}
            />
            {importErr && <p style={{fontSize:12, color:"#E11D48", marginBottom:10, background:"#FFF1F2", padding:"8px 12px", borderRadius:8}}>{importErr}</p>}
            <div style={{display:"flex", gap:10}}>
              <button className="btn" onClick={doImport} style={{background:"#16A34A", color:"white", padding:"10px 22px", flex:1, fontSize:14, fontWeight:600}}>Import Now</button>
              <button className="btn" onClick={function(){setShowImport(false);}} style={{background:"#F5F3EE", color:"#57534E", padding:"10px 22px"}}>Cancel</button>
            </div>
          </div>
        </div>
      }

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
