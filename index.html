var G_CLIENT_ID="999570977587-ag3da1l3lqcsnvfn61t33ugv9o4a57bk.apps.googleusercontent.com";
var G_APP_ID="999570977587";
var G_SHEET_ID="17PP0gYDaLlFgRoCKR2wBwo9s0ZSZ_xdMmbJzyVpJd2w";
var G_INTAKE_SHEET="Appointment booking (Responses)"; // read-only intake form sheet
var G_DATA_SHEET="BBB_ClientData";                   // read-write hub data sheet

// ─── CLOUD SHEET SCHEMA ───────────────────────────────────────────────────────
// Each client is stored as ONE row in BBB_ClientData.
// Columns: A=id, B=cc, C=name, D=email, E=phone, F=dob, G=gender, H=city,
//          I=source, J=goal, K=conditions, L=onMed, M=meds,
//          N=workedBefore, O=lastProgram, P=progress, Q=prevNutri,
//          R=referredBy, S=referredByName, T=referralCount, U=date,
//          V=foodAllergies, W=foodIntolerances, X=supplements, Y=dietaryRestrictions,
//          Z=paymentsJSON, AA=sessionsJSON, AB=scheduledMessagesJSON,
//          AC=currentSession
var CLOUD_HEADERS=["id","cc","name","email","phone","dob","gender","city",
  "source","goal","conditions","onMed","meds",
  "workedBefore","lastProgram","progress","prevNutri",
  "referredBy","referredByName","referralCount","date",
  "foodAllergies","foodIntolerances","supplements","dietaryRestrictions",
  "paymentsJSON","sessionsJSON","scheduledMessagesJSON","currentSession"];

// Convert client object → sheet row array
function clientToRow(c){
  return CLOUD_HEADERS.map(function(k){
    if(k==="paymentsJSON")return JSON.stringify(c.payments||[]);
    if(k==="sessionsJSON")return JSON.stringify(c.sessions||[]);
    if(k==="scheduledMessagesJSON")return JSON.stringify(c.scheduledMessages||[]);
    var v=c[k];
    if(v===undefined||v===null)return"";
    return String(v);
  });
}

// Convert sheet row array → client object
function rowToClient(row){
  var c={};
  CLOUD_HEADERS.forEach(function(k,i){
    var v=row[i]||"";
    if(k==="paymentsJSON"){try{c.payments=JSON.parse(v||"[]");}catch(e){c.payments=[];}}
    else if(k==="sessionsJSON"){try{c.sessions=JSON.parse(v||"[]");}catch(e){c.sessions=[];}}
    else if(k==="scheduledMessagesJSON"){try{c.scheduledMessages=JSON.parse(v||"[]");}catch(e){c.scheduledMessages=[];}}
    else if(k==="currentSession"){c.currentSession=Number(v)||0;}
    else if(k==="referralCount"){c.referralCount=Number(v)||0;}
    else{c[k]=v;}
  });
  if(!c.id)c.id=Date.now()+Math.random();
  return c;
}

// ─── GOOGLE TOKEN ─────────────────────────────────────────────────────────────
function gGetToken(){try{return localStorage.getItem("bbb_gt");}catch(e){return null;}}
function gSetToken(t){try{localStorage.setItem("bbb_gt",t);}catch(e){}}
function gClearToken(){try{localStorage.removeItem("bbb_gt");}catch(e){}}
function isExpired(data){return data&&data.error&&(data.error.code===401||data.error.status==="UNAUTHENTICATED");}

function gSignIn(cb){
  if(typeof google==="undefined"){alert("Google services not available.");return;}
  var client=google.accounts.oauth2.initTokenClient({
    client_id:G_CLIENT_ID,scope:G_SCOPES,
    callback:function(resp){if(resp.access_token){gSetToken(resp.access_token);if(cb)cb(resp.access_token);}}
  });
  client.requestAccessToken();
}

// ─── CLOUD READ/WRITE HELPERS ─────────────────────────────────────────────────
// Ensure BBB_ClientData sheet exists; create it if missing
async function ensureDataSheet(token){
  try{
    var meta=await fetch("https://sheets.googleapis.com/v4/spreadsheets/"+G_SHEET_ID+"?fields=sheets.properties.title",
      {headers:{"Authorization":"Bearer "+token}});
    var mdata=await meta.json();
    if(isExpired(mdata))return"expired";
    var sheets=(mdata.sheets||[]).map(function(s){return s.properties.title;});
    if(sheets.indexOf(G_DATA_SHEET)>=0)return true;
    // Create the sheet
    var cr=await fetch("https://sheets.googleapis.com/v4/spreadsheets/"+G_SHEET_ID+":batchUpdate",{
      method:"POST",headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
      body:JSON.stringify({requests:[{addSheet:{properties:{title:G_DATA_SHEET}}}]})
    });
    var cdata=await cr.json();
    if(isExpired(cdata))return"expired";
    // Write header row
    await writeRange(token,G_DATA_SHEET+"!A1",[[CLOUD_HEADERS]]);
    return true;
  }catch(e){return false;}
}

async function writeRange(token,range,values){
  var res=await fetch(
    "https://sheets.googleapis.com/v4/spreadsheets/"+G_SHEET_ID+"/values/"+encodeURIComponent(range)+"?valueInputOption=USER_ENTERED",
    {method:"PUT",headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
     body:JSON.stringify({range:range,majorDimension:"ROWS",values:values})}
  );
  return await res.json();
}

async function appendRow(token,row){
  var res=await fetch(
    "https://sheets.googleapis.com/v4/spreadsheets/"+G_SHEET_ID+"/values/"+encodeURIComponent(G_DATA_SHEET+"!A:AC")+":append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS",
    {method:"POST",headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
     body:JSON.stringify({values:[row]})}
  );
  return await res.json();
}

// Read all clients from BBB_ClientData
async function cloudReadClients(token){
  try{
    var r=await fetch(
      "https://sheets.googleapis.com/v4/spreadsheets/"+G_SHEET_ID+"/values/"+encodeURIComponent(G_DATA_SHEET+"!A:AC"),
      {headers:{"Authorization":"Bearer "+token}}
    );
    var data=await r.json();
    if(isExpired(data))return"expired";
    var rows=data.values||[];
    if(rows.length<2)return[];
    // Skip header row (row 0)
    return rows.slice(1).map(rowToClient);
  }catch(e){return[];}
}

// Save a single client to cloud — finds its row by id, updates in place; appends if new
async function cloudSaveClient(token,client,allClients){
  try{
    var ok=await ensureDataSheet(token);
    if(ok==="expired")return"expired";
    // Find row index in sheet (1-based, +1 for header)
    var rowIdx=allClients.findIndex(function(c){return String(c.id)===String(client.id);});
    var row=clientToRow(client);
    if(rowIdx<0){
      // New client — append
      var res=await appendRow(token,row);
      if(isExpired(res))return"expired";
    }else{
      // Existing — overwrite row (rowIdx+2: +1 for 0-based, +1 for header)
      var sheetRow=rowIdx+2;
      var range=G_DATA_SHEET+"!A"+sheetRow+":AC"+sheetRow;
      var res2=await writeRange(token,range,[row]);
      if(isExpired(res2))return"expired";
    }
    return true;
  }catch(e){return false;}
}

// Save ALL clients at once (bulk sync after intake import)
async function cloudSaveAll(token,clients){
  try{
    var ok=await ensureDataSheet(token);
    if(ok==="expired")return"expired";
    if(!clients.length)return true;
    var rows=clients.map(clientToRow);
    // Write from row 2 (row 1 = header)
    var range=G_DATA_SHEET+"!A2:AC"+(clients.length+1);
    var res=await writeRange(token,range,rows);
    if(isExpired(res))return"expired";
    return true;
  }catch(e){return false;}
}

// ─── INTAKE SHEET SYNC (read-only) ────────────────────────────────────────────
async function gSyncSheets(token){
  try{
    var url="https://sheets.googleapis.com/v4/spreadsheets/"+G_SHEET_ID+"/values/"+encodeURIComponent(G_INTAKE_SHEET);
    var res=await fetch(url,{headers:{"Authorization":"Bearer "+token}});
    var data=await res.json();
    if(isExpired(data))return"expired";
    if(!data.values||data.values.length<2)return[];
    var headers=data.values[0];
    return data.values.slice(1).map(function(row){var obj={};headers.forEach(function(h,i){obj[h]=row[i]||"";});return obj;});
  }catch(e){return[];}
}

// ─── GMAIL ────────────────────────────────────────────────────────────────────
async function gSendEmail(token,to,subject,body){
  try{
    var raw=["To: "+to,"Subject: "+subject,"Content-Type: text/plain; charset=utf-8","",body].join("\n");
    var enc=btoa(unescape(encodeURIComponent(raw))).replace(/[+]/g,"-").replace(/[/]/g,"_").replace(/[=]+$/,"");
    var res=await fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages/send",
      {method:"POST",headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},body:JSON.stringify({raw:enc})});
    var data=await res.json();
    if(isExpired(data))return"expired";
    return!data.error;
  }catch(e){return false;}
}

// ─── CALENDAR ─────────────────────────────────────────────────────────────────
async function gCreateCalEvent(token,c){
  try{
    if(!token)return null;
    var sess=curSess(c);
    var sl=sess.prefDate||sess.prefWE||sess.prefWD||"";
    var start=sl?new Date(sl):new Date();
    if(isNaN(start.getTime()))start=new Date();
    var end=new Date(start.getTime()+3600000);
    var ev={
      summary:"Session: "+c.name+" - "+(sess.service||sess.plan||"Consultation"),
      description:"Client: "+c.name+"\nPhone: "+c.phone+"\nEmail: "+c.email+"\nPlan: "+sess.plan+"\nGoals: "+c.goal,
      start:{dateTime:start.toISOString(),timeZone:"Asia/Kolkata"},
      end:{dateTime:end.toISOString(),timeZone:"Asia/Kolkata"},
      attendees:c.email?[{email:c.email}]:[]
    };
    if(!isOffline(c))ev.conferenceData={createRequest:{requestId:"bbb-"+c.id,conferenceSolutionKey:{type:"hangoutsMeet"}}};
    var url="https://www.googleapis.com/calendar/v3/calendars/primary/events?conferenceDataVersion=1&sendUpdates=all";
    var res=await fetch(url,{method:"POST",headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},body:JSON.stringify(ev)});
    var data=await res.json();
    if(isExpired(data))return"expired";
    if(data.error)return null;
    var ep=data.conferenceData&&data.conferenceData.entryPoints&&data.conferenceData.entryPoints.find(function(e){return e.entryPointType==="video";});
    return ep?ep.uri:null;
  }catch(e){return null;}
}

// ─── DRIVE ────────────────────────────────────────────────────────────────────
async function getDriveFiles(token,folderId){
  try{
    var url="https://www.googleapis.com/drive/v3/files?q='"+folderId+"'+in+parents+and+trashed=false&fields=files(id,name,mimeType,webViewLink,webContentLink)&orderBy=name";
    var res=await fetch(url,{headers:{"Authorization":"Bearer "+token}});
    var data=await res.json();
    if(isExpired(data))return"expired";
    return data.files||[];
  }catch(e){return[];}
}

async function shareFileWithEmail(token,fileId,email,canDownload){
  try{
    var res=await fetch("https://www.googleapis.com/drive/v3/files/"+fileId+"/permissions",
      {method:"POST",headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
       body:JSON.stringify({role:"reader",type:"user",emailAddress:email})});
    var data=await res.json();
    if(data.error)return null;
    var fileRes=await fetch("https://www.googleapis.com/drive/v3/files/"+fileId+"?fields=webViewLink,webContentLink",
      {headers:{"Authorization":"Bearer "+token}});
    var fileData=await fileRes.json();
    return canDownload?(fileData.webContentLink||fileData.webViewLink):fileData.webViewLink;
  }catch(e){return null;}
}

function openFolderPicker(token,callback){
  if(typeof gapi==="undefined"){alert("Google API not loaded.");return;}
  gapi.load("picker",function(){
    var folderView=new google.picker.DocsView(google.picker.ViewId.FOLDERS);
    folderView.setSelectFolderEnabled(true);
    var picker=new google.picker.PickerBuilder()
      .setAppId(G_APP_ID).setOAuthToken(token).addView(folderView)
      .setCallback(function(data){if(data.action===google.picker.Action.PICKED)callback(data.docs[0]);})
      .build();
    picker.setVisible(true);
  });
}

var CARE_KW=["monthly support","half yearly","care package","30 days","60 days"];

function hasCare(c){
  if(!c)return false;
  var sess=curSess(c);
  var s=(sess.service||c.service||"").toLowerCase();
  var p=(sess.plan||c.plan||"").toLowerCase();
  if(s.indexOf("homemaker")>=0)return true;
  for(var i=0;i<CARE_KW.length;i++){if(p.indexOf(CARE_KW[i])>=0)return true;}
  return false;
}
function isOffline(c){
  var sess=curSess(c);
  var m=(sess.sesMode||c.sesMode||"").toLowerCase();
  return m.indexOf("person")>=0||m.indexOf("offline")>=0;
}
function curSess(c){
  if(!c||!c.sessions||!c.sessions.length)return c||{};
  return c.sessions[c.currentSession||0]||c.sessions[0];
}
function cStage(c){return(curSess(c).stage)||"New Inquiry";}
function formatSlot(val){if(!val)return"";return String(val).trim();}
function parseDate(ts){
  if(!ts)return"";
  try{
    var d;
    if(typeof ts==="number"){d=new Date((ts-25569)*86400*1000);}
    else{d=new Date(ts);if(isNaN(d.getTime()))return String(ts);}
    if(isNaN(d.getTime()))return String(ts);
    return d.toLocaleDateString("en-IN",{month:"short",day:"numeric",year:"2-digit",timeZone:"Asia/Kolkata"});
  }catch(e){return String(ts)||"";}
}

function assignCodes(clients){
  var sorted=clients.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  var used={};
  return sorted.map(function(c){
    if(c.cc){used[c.cc]=1;return c;}
    var code=genCode(Object.keys(used).map(function(k){return{cc:k};}),c.date);
    used[code]=1;
    return Object.assign({},c,{cc:code});
  });
}

function genCode(clients,date){
  var d;try{d=date?new Date(date):new Date();if(isNaN(d.getTime()))d=new Date();}catch(e){d=new Date();}
  var yy=String(d.getFullYear()).slice(-2);
  var mm=String(d.getMonth()+1).padStart(2,"0");
  var existing=clients.filter(function(c){return c.cc&&c.cc.startsWith(yy)&&c.cc.slice(3,5)===mm;});
  var allCodes=clients.map(function(c){return c.cc;}).filter(Boolean);
  var serial=existing.length+1;
  var code="";var attempts=0;
  while(attempts<200){
    var batch=Math.floor((serial-1)/100);var rem=batch===0?serial:(serial-1)%100;
    code=yy+batch+mm+String(rem).padStart(2,"0");
    if(allCodes.indexOf(code)===-1)break;
    serial++;attempts++;
  }
  return code;
}

function detectAndMerge(incoming,existing){
  var updatedExisting=existing.slice();var toAdd=[];
  incoming.forEach(function(newC){
    var refCode=(newC.sessions[0]&&newC.sessions[0].refCode)||"";
    if(refCode){
      var referrer=existing.find(function(c){return c.cc===refCode;});
      if(referrer){
        var nameMatch=referrer.name.toLowerCase().trim()===newC.name.toLowerCase().trim();
        var emailMatch=referrer.email.toLowerCase().trim()===newC.email.toLowerCase().trim();
        if(nameMatch||emailMatch){
          newC.sessions[0].sessionNum=(referrer.sessions?referrer.sessions.length:0)+1;
          updatedExisting=updatedExisting.map(function(c){
            if(c.id!==referrer.id)return c;
            var sessions=(c.sessions||[]).concat(newC.sessions);
            return Object.assign({},c,{sessions:sessions,currentSession:sessions.length-1});
          });return;
        }else{
          newC.referredBy=refCode;newC.referredByName=referrer.name;
          updatedExisting=updatedExisting.map(function(c){
            if(c.id!==referrer.id)return c;
            return Object.assign({},c,{referralCount:(c.referralCount||0)+1});
          });
        }
      }
    }
    var existing_email=existing.find(function(c){return c.email&&c.email.toLowerCase()===(newC.email||"").toLowerCase();});
    if(!existing_email)toAdd.push(newC);
  });
  return assignCodes(updatedExisting.concat(toAdd));
}

function scheduleMessages(client,newStage){
  var now=new Date();
  var rules={
    "Awaiting Payment":[{type:"payment_reminder",label:"Payment Reminder",days:1}],
    "Care Package Dispatched":[{type:"care_followup",label:"Care Package Follow-up",days:3}],
    "Session Confirmed":[{type:"session_reminder",label:"Session Reminder",days:0,morning:true}],
    "Active Client":[{type:"weekly_followup",label:"Weekly Check-in",days:7}],
    "Follow-up":[{type:"reengagement",label:"Re-engagement",days:30}]
  };
  var r=rules[newStage];
  if(!r)return client.scheduledMessages||[];
  var existing=(client.scheduledMessages||[]).filter(function(m){return!m.sent;});
  r.forEach(function(rule){
    var sendAt=new Date(now);
    if(rule.morning){sendAt.setHours(8,0,0,0);if(sendAt<=now)sendAt.setDate(sendAt.getDate()+1);}
    else{sendAt.setDate(sendAt.getDate()+rule.days);sendAt.setHours(8,0,0,0);}
    existing.push({
      id:Date.now()+Math.random(),type:rule.type,label:rule.label,
      clientId:client.id,clientName:client.name,scheduledFor:sendAt.toISOString(),sent:false,
      waMsg:buildMsg(client,rule.type,"wa"),emMsg:buildMsg(client,rule.type,"em"),
      phone:client.phone,email:client.email
    });
  });
  return existing;
}

function getUpcomingBirthdays(clients){
  var today=new Date();today.setHours(0,0,0,0);
  return clients.filter(function(c){
    if(!c.dob)return false;
    try{
      var d=new Date(c.dob);if(isNaN(d.getTime()))return false;
      var thisYear=new Date(today.getFullYear(),d.getMonth(),d.getDate());
      if(thisYear<today)thisYear.setFullYear(today.getFullYear()+1);
      var diff=Math.ceil((thisYear-today)/86400000);
      return diff>0&&diff<=7;
    }catch(e){return false;}
  }).map(function(c){
    var d=new Date(c.dob);
    var thisYear=new Date(today.getFullYear(),d.getMonth(),d.getDate());
    if(thisYear<today)thisYear.setFullYear(today.getFullYear()+1);
    return Object.assign({},c,{daysUntilBirthday:Math.ceil((thisYear-today)/86400000),birthdayDate:thisYear.toLocaleDateString("en-US",{month:"long",day:"numeric"})});
  }).sort(function(a,b){return a.daysUntilBirthday-b.daysUntilBirthday;});
}

function getTodaysBirthdays(clients){
  var today=new Date();var todayMonth=today.getMonth()+1;var todayDay=today.getDate();
  return clients.filter(function(c){
    if(!c.dob)return false;
    try{var d=new Date(c.dob);if(isNaN(d.getTime()))return false;return d.getMonth()+1===todayMonth&&d.getDate()===todayDay;}catch(e){return false;}
  });
}

function getAllScheduled(clients){
  var all=[];
  clients.forEach(function(c){(c.scheduledMessages||[]).forEach(function(m){if(!m.sent)all.push(Object.assign({},m,{clientName:c.name,phone:c.phone,email:c.email}));});});
  return all.sort(function(a,b){return new Date(a.scheduledFor)-new Date(b.scheduledFor);});
}

function getSchedStatus(scheduledFor){
  var now=new Date();var then=new Date(scheduledFor);var diff=then-now;
  if(diff<0)return"overdue";if(diff<86400000)return"today";if(diff<86400000*3)return"soon";return"future";
}

function formatSchedTime(scheduledFor){
  var d=new Date(scheduledFor);var now=new Date();var diff=d-now;
  if(diff<0){var ago=Math.abs(diff);if(ago<3600000)return Math.floor(ago/60000)+" mins overdue";if(ago<86400000)return Math.floor(ago/3600000)+" hrs overdue";return Math.floor(ago/86400000)+" days overdue";}
  if(diff<86400000)return"Today at "+d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
  if(diff<86400000*2)return"Tomorrow at "+d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" at "+d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
}

      setCloudStatus(res?"saved":"error");

          var sessions=c.sessions?c.sessions.slice():[];var idx=c.currentSession||0;
          if(sessions[idx])sessions[idx]=Object.assign({},sessions[idx],sessUpd);
          merged.sessions=sessions;
        }
        updated=merged;
        return merged;
      });
      if(updated)triggerCloudSave(updated,next);
      return next;
    });
    setSel(function(p){

      var sessUpd={};var clientUpd={};

      var merged=Object.assign({},p,clientUpd);
      if(Object.keys(sessUpd).length>0){

      }

    });
  }

          </div>
          <div style={{display:"flex",gap:8,marginTop:14}}>
            <button className="btn" onClick={function(){if(payForm.amount)addPayment(payClient.id,payForm);}} style={{background:"#1C1917",color:"white",padding:"10px 18px",flex:1,fontWeight:600}}>Record Payment</button>
            <button className="btn" onClick={function(){setShowPayTracker(false);}} style={{background:"#F5F3EE",color:"#57534E",padding:"10px 14px"}}>Close</button>
          </div>
        </div>
      </div>
    )}

    {/* Edit client modal */}
    {showEdit&&editData&&(
      <div className="overlay" onClick={function(){setShowEdit(false);}}>
        <div className="modal fi" onClick={function(e){e.stopPropagation();}}>
          <h2 className="serif" style={{fontSize:20,marginBottom:14}}>Edit Client</h2>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div className="field" style={{gridColumn:"1/-1"}}><label>Full Name</label><input value={editData.name||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{name:e.target.value});})}}/></div>
            <div className="field"><label>WhatsApp</label><input value={editData.phone||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{phone:e.target.value});})}}/></div>
            <div className="field"><label>Email</label><input value={editData.email||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{email:e.target.value});})}}/></div>
            <div className="field"><label>Date of Birth</label><input placeholder="e.g. 1990-05-15" value={editData.dob||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{dob:e.target.value});})}}/></div>
            <div className="field"><label>Gender</label><select value={editData.gender||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{gender:e.target.value});});}}><option value="">Select</option>{["Male","Female","Other"].map(function(x){return <option key={x}>{x}</option>;})}</select></div>
            <div className="field"><label>City</label><input value={editData.city||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{city:e.target.value});})}}/></div>
            <div className="field"><label>Source</label><select value={editData.source||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{source:e.target.value});});}}><option value="">Select</option>{["Instagram","WhatsApp","Email","Referral","Google Form","Other"].map(function(x){return <option key={x}>{x}</option>;})}</select></div>
            <div className="field"><label>Stage</label><select value={editData.stage||"New Inquiry"} onChange={function(e){setEditData(function(p){return Object.assign({},p,{stage:e.target.value});})}}>
              {STAGES.map(function(x){return <option key={x}>{x}</option>;})}</select></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div className="field" style={{gridColumn:"1/-1"}}><label>Health Goals</label><input value={editData.goal||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{goal:e.target.value})})}}/></div>
            <div className="field" style={{gridColumn:"1/-1"}}><label>Medical Conditions</label><textarea value={editData.conditions||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{conditions:e.target.value})})}} rows={2}/></div>
            <div className="field" style={{gridColumn:"1/-1"}}><label>Medications & Doses</label><textarea value={editData.meds||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{meds:e.target.value})})}} rows={2}/></div>
            <div className="field" style={{gridColumn:"1/-1"}}><label>Food Allergies</label><input value={editData.foodAllergies||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{foodAllergies:e.target.value})})}}/></div>
            <div className="field" style={{gridColumn:"1/-1"}}><label>Food Intolerances</label><input value={editData.foodIntolerances||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{foodIntolerances:e.target.value})})}}/></div>
            <div className="field" style={{gridColumn:"1/-1"}}><label>Supplements</label><input value={editData.supplements||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{supplements:e.target.value})})}}/></div>
            <div className="field"><label>Dietary Restrictions</label><select value={editData.dietaryRestrictions||""} onChange={function(e){setEditData(function(p){return Object.assign({},p,{dietaryRestrictions:e.target.value})})}}><option value="">Select</option>{["Vegetarian","Vegan","Jain","Non-vegetarian","Eggetarian","Other"].map(function(x){return <option key={x}>{x}</option>;})}</select></div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button className="btn" onClick={function(){
              if(editData&&editData.name){
                // Merge edit changes into sessions too
                var token2=gGetToken();
                setClients(function(prev){
                  var next=prev.map(function(c){
                    if(c.id!==editData.id)return c;
                    var merged=Object.assign({},c,editData);
                    // Also push stage into current session if changed
                    if(editData.stage&&c.sessions){
                      var sessions=c.sessions.slice();var idx=c.currentSession||0;
                      if(sessions[idx])sessions[idx]=Object.assign({},sessions[idx],{stage:editData.stage,sesMode:editData.sesMode||sessions[idx].sesMode});
                      merged.sessions=sessions;
                    }
                    if(token2)triggerCloudSave(merged,next);
                    return merged;
                  });
                  return next;
                });
                setSel(function(p){
                  if(!p||p.id!==editData.id)return p;
                  return Object.assign({},p,editData);
                });
                setShowEdit(false);showToast("Client updated and saved to cloud!");
              }
            }} style={{background:"#1C1917",color:"white",padding:"10px 18px",flex:1,fontWeight:600}}>Save</button>
            <button className="btn" onClick={function(){setShowEdit(false);}} style={{background:"#F5F3EE",color:"#57534E",padding:"10px 14px"}}>Cancel</button>
          </div>
        </div>
      </div>
    )}

    {/* Add client modal */}
    {showAdd&&(
      <div className="overlay" onClick={function(){setShowAdd(false);}}>
        <div className="modal fi" onClick={function(e){e.stopPropagation();}}>
          <h2 className="serif" style={{fontSize:20,marginBottom:14}}>Add New Client</h2>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div className="field" style={{gridColumn:"1/-1"}}><label>Full Name *</label><input value={newC.name} onChange={function(e){setNewC(function(p){return Object.assign({},p,{name:e.target.value});})}}/></div>
            <div className="field"><label>WhatsApp</label><input value={newC.phone} onChange={function(e){setNewC(function(p){return Object.assign({},p,{phone:e.target.value});})}}/></div>
            <div className="field"><label>Email</label><input value={newC.email} onChange={function(e){setNewC(function(p){return Object.assign({},p,{email:e.target.value});})}}/></div>
            <div className="field"><label>Health Goal</label><input value={newC.goal} onChange={function(e){setNewC(function(p){return Object.assign({},p,{goal:e.target.value});})}}/></div>
            <div className="field"><label>Plan</label><input value={newC.plan} onChange={function(e){setNewC(function(p){return Object.assign({},p,{plan:e.target.value});})}}/></div>
            <div className="field"><label>Preferred Date</label><input value={newC.prefDate} onChange={function(e){setNewC(function(p){return Object.assign({},p,{prefDate:e.target.value});})}}/></div>
            <div className="field"><label>Session Mode</label><select value={newC.sesMode} onChange={function(e){setNewC(function(p){return Object.assign({},p,{sesMode:e.target.value});})}}><option>Online</option><option>In-person</option></select></div>
            <div className="field"><label>Source</label><select value={newC.source} onChange={function(e){setNewC(function(p){return Object.assign({},p,{source:e.target.value});});}}>{["Instagram","WhatsApp","Email","Referral","Google Form","Other"].map(function(x){return <option key={x}>{x}</option>;})}</select></div>
            <div className="field"><label>Stage</label><select value={newC.stage} onChange={function(e){setNewC(function(p){return Object.assign({},p,{stage:e.target.value});});}}>{STAGES.map(function(x){return <option key={x}>{x}</option>;})}</select></div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <button className="btn" onClick={addCli} style={{background:"#1C1917",color:"white",padding:"10px 18px",flex:1,fontWeight:600}}>Add Client</button>
            <button className="btn" onClick={function(){setShowAdd(false);}} style={{background:"#F5F3EE",color:"#57534E",padding:"10px 14px"}}>Cancel</button>
          </div>
        </div>
      </div>
    )}

    {/* Send resource modal */}
    {showSendResource&&resourceClient&&(
      <div className="overlay" onClick={function(){setShowSendResource(false);}}>
        <div className="modal fi" onClick={function(e){e.stopPropagation();}}>
          <h2 className="serif" style={{fontSize:20,marginBottom:4}}>Send Resource</h2>
          <p style={{fontSize:13,color:"#78716C",marginBottom:12}}>{resourceClient.name} — {resourceClient.email}</p>
          {!driveFolder&&<div style={{background:"#FFF8F0",border:"1px solid #FDE68A",borderRadius:10,padding:"12px 14px",marginBottom:12}}><p style={{fontSize:13,color:"#92400E"}}>No Drive folder selected. Go to ⚙️ Settings to set one.</p></div>}
          {driveFolder&&<div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <p style={{fontSize:12,color:"#57534E"}}>Folder: <strong>{driveFolder.name}</strong></p>
              <button className="btn" onClick={function(){loadDriveFiles(driveFolder.id);}} style={{background:"#F5F3EE",color:"#57534E",padding:"4px 10px",fontSize:11}}>{loadingFiles?"Loading...":"Refresh"}</button>
            </div>
            <div style={{maxHeight:200,overflowY:"auto",marginBottom:12}} className="scroll">
              {driveFiles.map(function(file){
                var isSelected=selectedFiles.find(function(f){return f.id===file.id;});
                return(
                  <div key={file.id} onClick={function(){setSelectedFiles(function(prev){if(prev.find(function(f){return f.id===file.id;}))return prev.filter(function(f){return f.id!==file.id;});return prev.concat([file]);});}} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:8,marginBottom:4,cursor:"pointer",background:isSelected?"#EFF6FF":"#FAFAF7",border:"1px solid "+(isSelected?"#3B82F6":"#E8E5DF")}}>
                    <div style={{width:16,height:16,borderRadius:4,border:"2px solid "+(isSelected?"#3B82F6":"#D6D3D1"),background:isSelected?"#3B82F6":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {isSelected&&<span style={{color:"white",fontSize:10,fontWeight:700}}>✓</span>}
                    </div>
                    <p style={{fontSize:12,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{file.name}</p>
                  </div>
                );
              })}
            </div>
            {selectedFiles.length>0&&<div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:8,padding:"8px 12px",marginBottom:12}}><p style={{fontSize:12,color:"#166534"}}>{selectedFiles.length} file(s) selected</p></div>}
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <button className={"chbtn"+(shareMode==="view"?" active":"")} onClick={function(){setShareMode("view");}}>View Only</button>
              <button className={"chbtn"+(shareMode==="download"?" active":"")} onClick={function(){setShareMode("download");}}>Downloadable</button>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn" onClick={function(){sendResourceToClient(resourceClient,selectedFiles,shareMode);}} disabled={!selectedFiles.length||!resourceClient.email} style={{background:"#1C1917",color:"white",padding:"10px 18px",flex:1,fontWeight:600}}>{!resourceClient.email?"No email on file":"Send "+selectedFiles.length+" File(s)"}</button>
              <button className="btn" onClick={function(){setShowSendResource(false);setSelectedFiles([]);}} style={{background:"#F5F3EE",color:"#57534E",padding:"10px 14px"}}>Cancel</button>
            </div>
          </div>}
        </div>
      </div>
    )}

    {/* Bulk message modal */}
    {showBulk&&(
      <div className="overlay" onClick={function(){if(!bulkSending)setShowBulk(false);}}>
        <div className="modal fi" onClick={function(e){e.stopPropagation();}}>
          <h2 className="serif" style={{fontSize:20,marginBottom:4}}>Bulk Message</h2>
          <p style={{fontSize:13,color:"#78716C",marginBottom:16}}>Send a message to multiple clients at once</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            <div className="field"><label>Send To</label>
              <select value={bulkGroup} onChange={function(e){setBulkGroup(e.target.value);}}>
                <option value="all">All Clients ({clients.length})</option>
                <option value="active">Active Clients ({getBulkRecipients("active").length})</option>
                <option value="followup">Follow-up ({getBulkRecipients("followup").length})</option>
                <option value="awaiting">Awaiting Payment ({getBulkRecipients("awaiting").length})</option>
              </select>
            </div>
            <div className="field"><label>Channel</label>
              <div style={{display:"flex",gap:6,marginTop:4}}>
                <button className={"chbtn"+(bulkCh==="wa"?" active":"")} onClick={function(){setBulkCh("wa");}}>WhatsApp</button>
                <button className={"chbtn"+(bulkCh==="em"?" active":"")} onClick={function(){setBulkCh("em");}}>Email</button>
              </div>
            </div>
          </div>
          <div className="field"><label>Message</label>
            <textarea value={bulkMsg} onChange={function(e){setBulkMsg(e.target.value);}} rows={7} placeholder="Write your message here..." style={{fontSize:12,lineHeight:1.6}}/>
          </div>
          <div style={{background:"#F5F3EE",borderRadius:10,padding:"12px 14px",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <p style={{fontSize:12,fontWeight:600,color:"#57534E"}}>Attach Drive File (optional)</p>
              <div style={{display:"flex",gap:6}}>
                {bulkFile&&<button className="btn" onClick={function(){setBulkFile(null);}} style={{background:"#FFF1F2",color:"#E11D48",padding:"3px 8px",fontSize:11}}>Remove</button>}
                <button className="btn" onClick={loadBulkDriveFiles} style={{background:"#0891B2",color:"white",padding:"4px 10px",fontSize:11}}>Browse Drive</button>
              </div>
            </div>
            {bulkFile?<div style={{background:"#EFF6FF",borderRadius:8,padding:"8px 10px"}}><p style={{fontSize:12,color:"#1D4ED8",fontWeight:500}}>{bulkFile.name}</p></div>:<p style={{fontSize:12,color:"#A8A29E"}}>No file attached.</p>}
          </div>
          {showBulkDrive&&bulkDriveFiles.length>0&&(
            <div style={{background:"white",border:"1px solid #E8E5DF",borderRadius:10,padding:"12px 14px",marginBottom:14,maxHeight:200,overflowY:"auto"}} className="scroll">
              {bulkDriveFiles.map(function(file){return(<div key={file.id} onClick={function(){setBulkFile({id:file.id,name:file.name,link:file.webViewLink||""});setShowBulkDrive(false);}} style={{padding:"8px 10px",borderRadius:8,marginBottom:4,cursor:"pointer",background:"#FAFAF7",border:"1px solid #E8E5DF"}}><p style={{fontSize:12}}>{file.name}</p></div>);})}
            </div>
          )}
          {bulkSending&&<div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:8,padding:"10px 12px",marginBottom:12}}><p style={{fontSize:12,color:"#1D4ED8",fontWeight:600}}>{bulkProgress||"Sending..."}</p></div>}
          <div style={{display:"flex",gap:8}}>
            <button className="btn" onClick={sendBulkMessages} disabled={bulkSending||!bulkMsg.trim()} style={{background:"#E11D48",color:"white",padding:"10px 18px",flex:1,fontWeight:600}}>{bulkSending?bulkProgress:"Send to "+getBulkRecipients(bulkGroup).length+" Clients"}</button>
            <button className="btn" onClick={function(){if(!bulkSending)setShowBulk(false);}} style={{background:"#F5F3EE",color:"#57534E",padding:"10px 14px"}}>Cancel</button>
          </div>
        </div>
      </div>
    )}

    {/* Review & testimonial modal */}
    {showRevTest&&revTestClient&&(
      <div className="overlay" onClick={function(){setShowRevTest(false);}}>
        <div className="modal fi" onClick={function(e){e.stopPropagation();}}>
          <h2 className="serif" style={{fontSize:20,marginBottom:4}}>Review & Testimonial</h2>
          <p style={{fontSize:13,color:"#78716C",marginBottom:16}}>{revTestClient.name}</p>
          {!showReward&&<div>
            <textarea value={revTestMsg} onChange={function(e){setRevTestMsg(e.target.value);}} rows={8} style={{fontSize:12,lineHeight:1.6,marginBottom:10}}/>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
              {revTestClient.phone&&<a href={"https://wa.me/"+revTestClient.phone.replace(/\D/g,"")+"?text="+encodeURIComponent(revTestMsg)} target="_blank" rel="noopener noreferrer" style={{background:"#22C55E",color:"white",padding:"6px 14px",borderRadius:8,fontSize:12,fontWeight:500,textDecoration:"none"}}>Send WhatsApp</a>}
              {revTestClient.email&&<a href={"mailto:"+revTestClient.email+"?subject=Share Your Experience!&body="+encodeURIComponent(revTestMsg)} style={{background:"#3B82F6",color:"white",padding:"6px 14px",borderRadius:8,fontSize:12,fontWeight:500,textDecoration:"none"}}>Send Email</a>}
            </div>
            <div style={{background:"#F5F3EE",borderRadius:10,padding:"12px 14px"}}>
              <p style={{fontSize:12,fontWeight:600,color:"#57534E",marginBottom:8}}>Received something? Send Reward:</p>
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                <button className={"chbtn"+(rewardType==="review"?" active":"")} onClick={function(){setRewardType("review");}}>Google Review</button>
                <button className={"chbtn"+(rewardType==="testimonial"?" active":"")} onClick={function(){setRewardType("testimonial");}}>Video Testimonial</button>
              </div>
              <button className="btn" onClick={function(){setShowReward(true);}} style={{background:"#1C1917",color:"white",padding:"8px 16px",fontSize:12,fontWeight:600}}>Select Reward File</button>
            </div>
          </div>}
          {showReward&&<div>
            <p style={{fontSize:13,fontWeight:600,color:"#1C1917",marginBottom:8}}>Paste Drive file link for: {rewardType==="review"?"Google Review":"Video Testimonial"}</p>
            <div className="field"><label>Drive File Link</label><input placeholder="https://drive.google.com/file/..." id="rewardFileLink"/></div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn" onClick={function(){var link=document.getElementById("rewardFileLink").value;if(!link){showToast("Please paste the file link");return;}var msg="Hi "+revTestClient.name.split(" ")[0]+"! Thank you so much for your "+(rewardType==="review"?"Google Review":"video testimonial")+"! Here is your special reward: "+link+"\n\nWarm regards,\nTaniya";if(revTestClient.phone)window.open("https://wa.me/"+revTestClient.phone.replace(/[^0-9]/g,"")+"?text="+encodeURIComponent(msg),"_blank");showToast("Reward message ready!");setShowReward(false);setShowRevTest(false);}} style={{background:"#1C1917",color:"white",padding:"10px 18px",flex:1,fontWeight:600}}>Send via WhatsApp</button>
              <button className="btn" onClick={function(){setShowReward(false);}} style={{background:"#F5F3EE",color:"#57534E",padding:"10px 14px"}}>Back</button>
            </div>
          </div>}
          {!showReward&&<button className="btn" onClick={function(){setShowRevTest(false);setShowReward(false);}} style={{background:"#F5F3EE",color:"#57534E",padding:"10px 14px",marginTop:8,width:"100%"}}>Close</button>}
        </div>
      </div>
    )}

  </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
