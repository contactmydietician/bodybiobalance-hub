<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#F7F6F2;color:#1C1917}
    .serif{font-family:'Cormorant Garamond',serif}
    .btn{cursor:pointer;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .18s}
    .btn:hover{filter:brightness(.92)} .btn:disabled{opacity:.5;cursor:not-allowed}
    .card{background:white;border-radius:14px;border:1px solid #E8E5DF}
    .tag{border-radius:20px;font-size:11px;font-weight:500;padding:3px 10px;display:inline-block}
    .tab{padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all .18s;border:none;background:transparent;font-family:'DM Sans',sans-serif}
    .tab.active{background:#1C1917;color:white} .tab:not(.active){color:#78716C} .tab:not(.active):hover{background:#EFEDE8}
    input,textarea,select{font-family:'DM Sans',sans-serif;font-size:13px;border:1px solid #E8E5DF;border-radius:8px;padding:9px 12px;width:100%;outline:none;background:white;transition:border .18s;color:#1C1917}
    input:focus,textarea:focus,select:focus{border-color:#92400E}
    .crow{padding:12px 16px;border-radius:10px;cursor:pointer;transition:background .15s;border:1.5px solid transparent}
    .crow:hover{background:#F5F3EE} .crow.sel{background:#FFF8F0;border-color:#F59E0B}
    .scroll{overflow-y:auto} .scroll::-webkit-scrollbar{width:4px} .scroll::-webkit-scrollbar-thumb{background:#D6D3D1;border-radius:4px}
    .chbtn{padding:7px 14px;border-radius:8px;border:1.5px solid #E8E5DF;cursor:pointer;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .18s;background:white}
    .chbtn.active{border-color:#92400E;background:#FFF8F0;color:#92400E}
    .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
    .aibtn{background:linear-gradient(135deg,#7C3AED,#A855F7);color:white;padding:9px 18px;border-radius:9px;border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
    .aibtn:disabled{opacity:.6;cursor:not-allowed}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
    .modal{background:white;border-radius:18px;padding:28px;width:560px;max-width:100%;max-height:90vh;overflow-y:auto}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}} .fi{animation:fadeIn .25s ease}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}} .pulse{animation:pulse 1.2s infinite}
    .code{background:#1C1917;color:#FDE68A;border-radius:10px;padding:16px;font-size:11px;font-family:monospace;white-space:pre-wrap;overflow-x:auto;line-height:1.6}
    .pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
    .stepbadge{width:26px;height:26px;border-radius:50%;background:#F59E0B;color:#1C1917;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const STAGES=["New Inquiry","Booked","Intake Sent","Active Client","Follow-up"];
const SC={"New Inquiry":{bg:"#FFF4E6",accent:"#F97316",dot:"#F97316"},"Booked":{bg:"#EFF6FF",accent:"#3B82F6",dot:"#3B82F6"},"Intake Sent":{bg:"#F0FDF4",accent:"#16A34A",dot:"#16A34A"},"Active Client":{bg:"#FAF5FF",accent:"#9333EA",dot:"#9333EA"},"Follow-up":{bg:"#FFF1F2",accent:"#E11D48",dot:"#E11D48"}};
const COL={timestamp:"Timestamp",name:"Name",email:"Email Address",phone:"Phone Number (preferably WhatsApp)",dob:"Date of Birth",gender:"Gender",city:"City /Location",workedBefore:"Have you worked with me before?",lastProgram:"🌿Which program did we last work on together?",progress:"🌿How has your progress been since we last worked together? ",referralCode:"🌿Please enter your referral/ client code",serviceRet:"🌿Which service would you like to book?",prevNutri:"🌱Have you worked with a nutritionist or dietitian before? ",source:"🌱How did you hear about me?",serviceNew:"🌱Which service would you like to book?",planConsultNew:"🌱Choose your 1:1 Nutrition Consultation plan",planHabitNew:"🌱Choose your Habit Building Program plan",planFastNew:"🌱Choose your Metabolic Reset plan",planFamilyNew:"🌱Choose your Homemaker's Family plan",planConsultRet:"🌿Choose your 1:1 Nutrition Consultation plan",planHabitRet:"🌿Choose your Habit Building plan",planFastRet:"🌿Choose your Metabolic Reset plan",planFamilyRet:"🌿Choose your Homemaker's Family plan",goal:"What are your primary health goals or concerns?",conditions:"Do you have any existing health conditions? (Select all that apply)",onMedication:"Are you currently on any medication?",medications:"Name of Medicines taken and its doses.",sessionMode:"How would you like to attend your session?",prefWeekend:"Preferred Slot [Weekend]",prefWeekday:"Preferred Slot [Weekdays]",prefDate:"Preferred Date",extraNotes:"Anything else you'd like me to know before your session? ",labReports:"Please upload your latest blood reports or doctor's prescription for reference."};
const TEMPLATES={"New Inquiry":{whatsapp:"Hi [Name] 👋 Thank you for reaching out! I'm Taniya, a Certified Diabetes Educator & Nutritionist. I'd love to learn more about your health goals. Could you share a bit about what you're looking for? I'll send over my availability for a free 15-min discovery call 🌿",email:{subject:"Thank you for reaching out — Let's talk nutrition!",body:"Hi [Name],\n\nThank you so much for getting in touch! I'm thrilled you're taking this step toward your health goals.\n\nI'd love to schedule a quick 15-minute discovery call to understand your needs.\n\nPlease reply with your preferred time slot, or use my booking link: [BOOKING LINK]\n\nLooking forward to connecting!\n\nWarm regards,\nTaniya\nCertified Diabetes Educator | M.Sc. Applied Nutrition"},instagram:"Hi [Name]! Thank you for your message 🌱 I'd love to help you on your wellness journey. Drop me your email and I'll send all the details + how to book your free discovery call! ✨"},"Booked":{whatsapp:"Hi [Name] 🎉 Your appointment is confirmed!\n\n📅 Date: [DATE]\n⏰ Time: [TIME]\n📍 Platform: [Zoom/Google Meet]\n\nPlease fill out your intake form before our call: [FORM LINK]\n\nSee you soon! 🌿",email:{subject:"Your appointment is confirmed ✅",body:"Hi [Name],\n\nYour session with me is officially confirmed!\n\n📅 Date: [DATE]\n⏰ Time: [TIME]\n📍 Platform: [LINK]\n\nBefore our session, please fill out your intake form:\n👉 [INTAKE FORM LINK]\n\nIf you need to reschedule, please let me know at least 24 hours in advance.\n\nSee you soon!\nTaniya"},instagram:"Your booking is confirmed, [Name]! 🎉 Check your email for all the details and your intake form link. Can't wait to work together! 🌿"},"Intake Sent":{whatsapp:"Hi [Name]! Just a gentle reminder to fill out your intake form 📋\n\n👉 [FORM LINK]\n\nIt only takes about 10 minutes and helps me create the most personalised plan for you! 🌱",email:{subject:"Reminder: Please complete your intake form 📋",body:"Hi [Name],\n\nJust a friendly reminder that your intake form is waiting for you!\n\n👉 Complete your form here: [FORM LINK]\n\nOur session is on [DATE] at [TIME] — looking forward to it!\n\nWarm regards,\nTaniya"},instagram:"Hey [Name]! Don't forget to fill out your intake form 📋 Check your email for the link — it only takes 10 mins! 🌿"},"Active Client":{whatsapp:"Hi [Name]! Hope you're doing well 🌱 Just checking in on how your meal plan is going this week. Any wins or challenges to share? 💪",email:{subject:"Weekly check-in — How are you feeling? 🌿",body:"Hi [Name],\n\nHope this week has been treating you well! Checking in on your nutrition plan.\n\n• How are your energy levels?\n• Finding the meal plan easy to follow?\n• Any symptoms or changes worth noting?\n\nReply anytime — I'm here to support you! 💪\n\nWarm regards,\nTaniya"},instagram:"Checking in on you [Name]! 🌱 How's your wellness journey going this week? DM me anytime! 💚"},"Follow-up":{whatsapp:"Hi [Name]! It's been a while 🌿 How are you doing with your health goals? Would you be open to a quick check-in call? 😊",email:{subject:"Checking in on your wellness journey 🌿",body:"Hi [Name],\n\nI hope you're doing wonderfully! It's been some time since we last connected.\n\nI have a few spots open this month if you'd like to reconnect: [BOOKING LINK]\n\nEither way, I'm rooting for you!\n\nWarm regards,\nTaniya\nCertified Diabetes Educator | M.Sc. Applied Nutrition"},instagram:"Hey [Name]! Thinking of you and your health journey 🌿 Would love to reconnect — DM me! 💚"}};
const CHECKLIST={"New Inquiry":["Reply within 2 hours","Send discovery call link","Log client source","Add to pipeline"],"Booked":["Send confirmation message","Add to Google Calendar","Share intake form link","Set 24hr reminder"],"Intake Sent":["Review intake form before session","Prepare personalised notes","Send reminder if not submitted 24hrs prior","Check for medical flags"],"Active Client":["Weekly check-in sent","Meal plan reviewed","Session notes updated","Next appointment booked"],"Follow-up":["Send re-engagement message","Note last interaction date","Offer returning client discount","Update pipeline status"]};

function getPlan(row){const plans=[{s:“1:1 Nutrition Consultation”,t:“🌱 New Client”,k:COL.planConsultNew},{s:“1:1 Nutrition Consultation”,t:“🌿 Returning/Referred”,k:COL.planConsultRet},{s:“Habit Building Program”,t:“🌱 New Client”,k:COL.planHabitNew},{s:“Habit Building Program”,t:“🌿 Returning/Referred”,k:COL.planHabitRet},{s:“Metabolic Reset & Water Fasting”,t:“🌱 New Client”,k:COL.planFastNew},{s:“Metabolic Reset & Water Fasting”,t:“🌿 Returning/Referred”,k:COL.planFastRet},{s:“Homemaker Family Nutrition”,t:“🌱 New Client”,k:COL.planFamilyNew},{s:“Homemaker Family Nutrition”,t:“🌿 Returning/Referred”,k:COL.planFamilyRet}];for(const p of plans){if(row[p.k])return{plan:row[p.k],service:p.s,ct:p.t};}return{plan:””,service:row[COL.serviceNew]||row[COL.serviceRet]||””,ct:row[COL.serviceRet]?“🌿 Returning/Referred”:“🌱 New Client”};}

function genCode(clients,date){const d=date?new Date(date):new Date();const yy=String(d.getFullYear()).slice(-2);const mm=String(d.getMonth()+1).padStart(2,“0”);const ex=clients.filter(c=>c.cc&&c.cc.startsWith(yy)&&c.cc.slice(3,5)===mm);const s=ex.length+1;const b=Math.floor((s-1)/100);const r=b===0?s:(s-1)%100;return`${yy}${b}${mm}${String(r).padStart(2,"0")}`;}

function parseRow(row){const{plan,service,ct}=getPlan(row);return{id:Date.now()+Math.random(),name:row[COL.name]||“Unknown”,email:row[COL.email]||””,phone:row[COL.phone]||””,dob:row[COL.dob]||””,gender:row[COL.gender]||””,city:row[COL.city]||””,workedBefore:row[COL.workedBefore]||””,lastProgram:row[COL.lastProgram]||””,progress:row[COL.progress]||””,prevNutri:row[COL.prevNutri]||””,source:row[COL.source]||“Form”,refCode:row[COL.referralCode]||””,service,plan,ct,goal:row[COL.goal]||””,conditions:row[COL.conditions]||””,onMed:row[COL.onMedication]||””,meds:row[COL.medications]||””,sesMode:row[COL.sessionMode]||””,prefWE:row[COL.prefWeekend]||””,prefWD:row[COL.prefWeekday]||””,prefDate:row[COL.prefDate]||””,notes2:row[COL.extraNotes]||””,labs:row[COL.labReports]||””,stage:“New Inquiry”,cc:””,notes:[row[COL.conditions],row[COL.medications]].filter(Boolean).join(” · “)||””,date:row[COL.timestamp]?new Date(row[COL.timestamp]).toLocaleDateString(“en-US”,{month:“short”,day:“numeric”}):new Date().toLocaleDateString(“en-US”,{month:“short”,day:“numeric”})};}

function assignCodes(clients){const s=[…clients].sort((a,b)=>new Date(a.date)-new Date(b.date));const u={};return s.map(c=>{if(c.cc){u[c.cc]=1;return c;}const code=genCode(Object.keys(u).map(k=>({cc:k})),c.date);u[code]=1;return{…c,cc:code};});}

function App(){
const[clients,setClients]=useState([]);
const[sel,setSel]=useState(null);
const[tab,setTab]=useState(“pipeline”);
const[ch,setCh]=useState(“whatsapp”);
const[copied,setCopied]=useState(””);
const[checked,setChecked]=useState({});
const[showAdd,setShowAdd]=useState(false);
const[showSync,setShowSync]=useState(false);
const[showImport,setShowImport]=useState(false);
const[importJson,setImportJson]=useState(””);
const[importErr,setImportErr]=useState(””);
const[aiLoad,setAiLoad]=useState(false);
const[aiMsg,setAiMsg]=useState(””);
const[aiP,setAiP]=useState(””);
const[search,setSearch]=useState(””);
const[fStage,setFStage]=useState(“All”);
const[syncSt,setSyncSt]=useState(””);
const[newC,setNewC]=useState({name:””,stage:“New Inquiry”,source:“Instagram”,goal:””,phone:””,email:””,conditions:””,meds:””,notes:””});

useEffect(()=>{try{const d=localStorage.getItem(“bbb_c”);if(d)setClients(JSON.parse(d));}catch{}try{const d=localStorage.getItem(“bbb_ch”);if(d)setChecked(JSON.parse(d));}catch{};},[]);
useEffect(()=>{try{localStorage.setItem(“bbb_c”,JSON.stringify(clients));}catch{};},[clients]);
useEffect(()=>{try{localStorage.setItem(“bbb_ch”,JSON.stringify(checked));}catch{};},[checked]);
useEffect(()=>{window.__receiveSheetData=(rows)=>{const inc=rows.map(parseRow);setClients(prev=>{const em=new Set(prev.map(c=>c.email?.toLowerCase()));const fresh=inc.filter(c=>!em.has(c.email?.toLowerCase()));if(!fresh.length){setSyncSt(“✓ No new clients”);setTimeout(()=>setSyncSt(””),3000);return prev;}setSyncSt(`✓ ${fresh.length} added`);setTimeout(()=>setSyncSt(””),4000);return assignCodes([…prev,…fresh]);});};return()=>{delete window.__receiveSheetData;};},[]);

const filtered=clients.filter(c=>(fStage===“All”||c.stage===fStage)&&(c.name.toLowerCase().includes(search.toLowerCase())||(c.goal||””).toLowerCase().includes(search.toLowerCase())));
const cnt=s=>clients.filter(c=>c.stage===s).length;
const getTpl=(stage,channel)=>{const t=TEMPLATES[stage];if(!t)return””;if(channel===“email”)return`Subject: ${t.email.subject}\n\n${t.email.body}`;return t[channel]||””;};
const pers=(tpl,c)=>c?tpl.replace(/[Name]/g,c.name.split(” “)[0]):tpl;
const copy=(text,label)=>{navigator.clipboard.writeText(text);setCopied(label);setTimeout(()=>setCopied(””),2000);};
const move=(client,dir)=>{const idx=STAGES.indexOf(client.stage),next=STAGES[idx+dir];if(!next)return;setClients(p=>p.map(c=>c.id===client.id?{…c,stage:next}:c));setSel(p=>p?.id===client.id?{…p,stage:next}:p);};
const addC=()=>{if(!newC.name)return;const ds=new Date().toLocaleDateString(“en-US”,{month:“short”,day:“numeric”});setClients(prev=>{const code=genCode(prev,new Date());return[…prev,{…newC,id:Date.now(),date:ds,cc:code,ct:newC.source===“Referral”?“🌿 Returning/Referred”:“🌱 New Client”}];});setShowAdd(false);setNewC({name:””,stage:“New Inquiry”,source:“Instagram”,goal:””,phone:””,email:””,conditions:””,meds:””,notes:””});};
const doImport=()=>{
setImportErr(””);
if(!importJson.trim()){setImportErr(“Please paste your JSON data first.”);return;}
try{
const rows=JSON.parse(importJson.trim());
if(!Array.isArray(rows)){setImportErr(“Invalid format — must be a JSON array starting with [{”);return;}
const incoming=rows.map(parseRow);
setClients(prev=>{
const em=new Set(prev.map(c=>c.email?.toLowerCase()));
const fresh=incoming.filter(c=>!em.has(c.email?.toLowerCase()));
if(!fresh.length){setSyncSt(“✓ No new clients — all already exist”);setTimeout(()=>setSyncSt(””),4000);setShowImport(false);return prev;}
setSyncSt(“✓ “+fresh.length+” client(s) imported!”);
setTimeout(()=>setSyncSt(””),5000);
setShowImport(false);
return assignCodes([…prev,…fresh]);
});
}catch(e){setImportErr(“Could not parse JSON. Make sure you copied the full output from Apps Script logs. Error: “+e.message);}
};

const genAi=async()=>{if(!sel||!aiP.trim())return;setAiLoad(true);setAiMsg(””);try{const res=await fetch(“https://api.anthropic.com/v1/messages”,{method:“POST”,headers:{“Content-Type”:“application/json”},body:JSON.stringify({model:“claude-sonnet-4-20250514”,max_tokens:1000,system:“You are Taniya, a Certified Diabetes Educator and Nutritionist with an M.Sc. in Applied Nutrition and 10 years of expertise. Write warm, professional, empathetic client messages. Be concise and encouraging. Use emojis sparingly. Sign off as Taniya.”,messages:[{role:“user”,content:`Client: ${sel.name}. Stage: ${sel.stage}. Goal: ${sel.goal}. Conditions: ${sel.conditions}. Medications: ${sel.meds}. Channel: ${ch}. Task: ${aiP}`}]})});const data=await res.json();setAiMsg(data.content?.find(b=>b.type===“text”)?.text||“Could not generate message.”);}catch{setAiMsg(“Error generating. Please try again.”);}setAiLoad(false);};

const script=`// Body Bio Balance — Google Apps Script

function syncAllClients() {
const sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();

const headers = data[0];
const rows = data.slice(1).map(row => {
const obj = {};
headers.forEach((h, i) => { obj[h] = row[i]; });
return obj;
});
Logger.log(JSON.stringify(rows));
// Copy the JSON from Logs, then in your hub’s browser console run:
// window.__receiveSheetData(PASTE_JSON_HERE)
}`;

return(
<div style={{fontFamily:”‘DM Sans’,sans-serif”,background:”#F7F6F2”,minHeight:“100vh”}}>
<div style={{background:”#1C1917”,color:“white”,padding:“18px 28px”,display:“flex”,alignItems:“center”,justifyContent:“space-between”,flexWrap:“wrap”,gap:12}}>
<div>
<h1 className=“serif” style={{fontSize:26,fontWeight:600,color:”#FDE68A”}}>Body Bio Balance Consultancy</h1>
<p style={{fontSize:12,color:”#A8A29E”,marginTop:2}}>Client Management Hub · Nutrition Practice</p>
</div>
<div style={{display:“flex”,gap:8,alignItems:“center”,flexWrap:“wrap”}}>
{syncSt&&<span style={{background:”#166534”,color:”#BBF7D0”,padding:“6px 14px”,borderRadius:8,fontSize:12}}>{syncSt}</span>}
<div style={{background:”#292524”,borderRadius:10,padding:“8px 14px”,fontSize:12}}><span style={{color:”#A8A29E”}}>Active: </span><span style={{color:”#FDE68A”,fontWeight:600}}>{cnt(“Active Client”)}</span></div>
<div style={{background:”#292524”,borderRadius:10,padding:“8px 14px”,fontSize:12}}><span style={{color:”#A8A29E”}}>Total: </span><span style={{color:”#FDE68A”,fontWeight:600}}>{clients.length}</span></div>
<button className=“btn” onClick={()=>setShowSync(true)} style={{background:”#78350F”,color:”#FDE68A”,padding:“9px 16px”,border:“1px solid #92400E”}}>🔗 Sync Guide</button>
<button className=“btn” onClick={()=>{setShowImport(true);setImportErr(””);setImportJson(””);}} style={{background:”#16A34A”,color:“white”,padding:“9px 16px”,fontWeight:600}}>📥 Import Clients</button>
<button className=“btn” onClick={()=>setShowAdd(true)} style={{background:”#F59E0B”,color:”#1C1917”,padding:“9px 16px”,fontWeight:600}}>+ Add Client</button>

  <div style={{padding:"14px 28px 0",display:"flex",gap:4,borderBottom:"1px solid #E8E5DF",background:"white",overflowX:"auto"}}>

        {filtered.map(c=>(

              <div>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <h2 className="serif" style={{fontSize:22,fontWeight:600}}>{s.name}</h2>
                  {s.cc&&<span style={{background:"#1C1917",color:"#FDE68A",borderRadius:8,padding:"3px 10px",fontSize:12,fontWeight:700,fontFamily:"monospace"}}>#{s.cc}</span>}
                </div>
                <div style={{display:"flex",gap:14,marginTop:5,fontSize:12,color:"#57534E",flexWrap:"wrap"}}>
                  {s.goal&&<span>🎯 {s.goal}</span>}{s.phone&&<span>📱 {s.phone}</span>}{s.email&&<span>✉️ {s.email}</span>}
                </div>
                {s.plan&&<p style={{marginTop:5,fontSize:12,color:"#92400E",fontWeight:500}}>📦 {s.plan} ({s.ct})</p>}
                {s.conditions&&<p style={{marginTop:4,fontSize:12,color:"#78716C",fontStyle:"italic"}}>⚕️ {s.conditions}</p>}
                {s.meds&&<p style={{marginTop:3,fontSize:12,color:"#78716C",fontStyle:"italic"}}>💊 {s.meds}</p>}
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8}}>
                <span className="pill" style={{background:color.accent,color:"white"}}>{s.stage}</span>
                <div style={{display:"flex",gap:6}}>
                  <button className="btn" onClick={()=>move(s,-1)} disabled={STAGES.indexOf(s.stage)===0} style={{background:"white",border:"1px solid #E8E5DF",padding:"5px 12px",fontSize:11,color:"#57534E"}}>← Back</button>
                  <button className="btn" onClick={()=>move(s,1)} disabled={STAGES.indexOf(s.stage)===STAGES.length-1} style={{background:color.accent,color:"white",padding:"5px 12px",fontSize:11}}>Next Stage →</button>
                </div>
              </div>
            </div>

            {tab==="pipeline"&&(
              <div className="card" style={{padding:20}}>
                <h3 className="serif" style={{fontSize:18,marginBottom:16}}>Journey Pipeline</h3>
                <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:8}}>
                  {STAGES.map((stage,i)=>{const isCur=s.stage===stage,isDone=i<STAGES.indexOf(s.stage);return(
                    <div key={stage} style={{flex:"1 0 110px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}><span className="dot" style={{background:SC[stage].dot}}/><p style={{fontSize:10,fontWeight:600,color:"#57534E",textTransform:"uppercase",letterSpacing:".05em",lineHeight:1.3}}>{stage}</p></div>
                      <div style={{padding:"10px 12px",borderRadius:10,background:SC[stage].bg,border:`1.5px solid ${isCur?SC[stage].accent:"transparent"}`,minHeight:56}}>
                        {isCur?<div><p style={{fontSize:13,fontWeight:600}}>{s.name.split(" ")[0]}</p><p style={{fontSize:11,color:"#78716C",marginTop:2}}>{s.date}</p></div>:<p style={{fontSize:11,color:isDone?"#22C55E":"#D6D3D1",fontStyle:"italic"}}>{isDone?"✓ Done":"Upcoming"}</p>}
                      </div>
                      <p style={{fontSize:10,color:"#A8A29E",textAlign:"center",marginTop:4}}>{cnt(stage)} total</p>
                    </div>
                  );})}
                </div>
              </div>
            )}

            {tab==="templates"&&(
              <div className="card" style={{padding:20}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
                  <h3 className="serif" style={{fontSize:18}}>Templates — {s.stage}</h3>
                  <div style={{display:"flex",gap:6}}>{["whatsapp","email","instagram"].map(c=><button key={c} className={`chbtn ${ch===c?"active":""}`} onClick={()=>setCh(c)}>{c==="whatsapp"?"💬 WhatsApp":c==="email"?"✉️ Email":"📸 Instagram"}</button>)}</div>
                </div>
                <div style={{position:"relative"}}>
                  <textarea value={pers(getTpl(s.stage,ch),s)} readOnly rows={ch==="email"?12:7} style={{fontSize:13,lineHeight:1.75,background:"#FAFAF7",resize:"none",color:"#292524"}}/>
                  <button className="btn" onClick={()=>copy(pers(getTpl(s.stage,ch),s),"tpl")} style={{position:"absolute",top:10,right:10,background:"#1C1917",color:"white",padding:"6px 14px"}}>{copied==="tpl"?"✓ Copied!":"Copy"}</button>
                </div>
                <div style={{marginTop:12,display:"flex",gap:8,flexWrap:"wrap"}}>
                  {ch==="whatsapp"&&s.phone&&<a href={`https://wa.me/${s.phone.replace(/\D/g,"")}?text=${encodeURIComponent(pers(TEMPLATES[s.stage]?.whatsapp||"",s))}`} target="_blank" rel="noopener noreferrer" style={{background:"#22C55E",color:"white",padding:"8px 16px",borderRadius:8,fontSize:12,fontWeight:500,textDecoration:"none"}}>💬 Open in WhatsApp</a>}
                  {ch==="email"&&s.email&&<a href={`mailto:${s.email}?subject=${encodeURIComponent(TEMPLATES[s.stage]?.email?.subject||"")}&body=${encodeURIComponent(pers(TEMPLATES[s.stage]?.email?.body||"",s))}`} style={{background:"#3B82F6",color:"white",padding:"8px 16px",borderRadius:8,fontSize:12,fontWeight:500,textDecoration:"none"}}>✉️ Open in Mail</a>}
                </div>
              </div>
            )}

            {tab==="checklist"&&(
              <div className="card" style={{padding:20}}>
                <h3 className="serif" style={{fontSize:18,marginBottom:4}}>Checklist — {s.stage}</h3>
                <p style={{fontSize:12,color:"#A8A29E",marginBottom:16}}>Tasks before moving {s.name.split(" ")[0]} to the next stage</p>
                {CHECKLIST[s.stage]?.map(item=>{const key=`${s.id}-${item}`,done=checked[key];return(
                  <div key={item} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #F5F3EE"}}>
                    <div onClick={()=>setChecked(p=>({...p,[key]:!p[key]}))} style={{width:20,height:20,borderRadius:6,border:`2px solid ${done?color.accent:"#D6D3D1"}`,background:done?color.accent:"white",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>{done&&<span style={{color:"white",fontSize:11,fontWeight:700}}>✓</span>}</div>
                    <p style={{fontSize:13,textDecoration:done?"line-through":"none",color:done?"#A8A29E":"#292524"}}>{item}</p>
                  </div>
                );})}
                <div style={{marginTop:14,padding:"10px 14px",background:"#F5F3EE",borderRadius:10}}><p style={{fontSize:12,color:"#78716C"}}>{CHECKLIST[s.stage]?.filter(item=>checked[`${s.id}-${item}`]).length||0} / {CHECKLIST[s.stage]?.length} completed</p></div>
              </div>
            )}

            {tab==="ai-compose"&&(
              <div className="card" style={{padding:20}}>
                <h3 className="serif" style={{fontSize:18,marginBottom:4}}>✨ AI Compose</h3>
                <p style={{fontSize:12,color:"#A8A29E",marginBottom:14}}>Generate a personalised message for {s.name.split(" ")[0]}</p>
                <div style={{display:"flex",gap:6,marginBottom:12}}>{["whatsapp","email","instagram"].map(c=><button key={c} className={`chbtn ${ch===c?"active":""}`} onClick={()=>setCh(c)}>{c==="whatsapp"?"💬 WhatsApp":c==="email"?"✉️ Email":"📸 Instagram"}</button>)}</div>
                <textarea placeholder={`e.g. "Follow up on her diabetes meal plan and encourage booking next session"`} value={aiP} onChange={e=>setAiP(e.target.value)} rows={3} style={{marginBottom:10,lineHeight:1.6}}/>
                <button className="aibtn" onClick={genAi} disabled={aiLoad||!aiP.trim()}>{aiLoad?<span className="pulse">Generating...</span>:"✨ Generate Message"}</button>
                {aiMsg&&<div className="fi" style={{marginTop:16,position:"relative"}}><div style={{background:"#FAF5FF",border:"1px solid #E9D5FF",borderRadius:10,padding:16}}><pre style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,lineHeight:1.75,whiteSpace:"pre-wrap",color:"#292524"}}>{aiMsg}</pre></div><button className="btn" onClick={()=>copy(aiMsg,"ai")} style={{position:"absolute",top:10,right:10,background:"#7C3AED",color:"white",padding:"5px 12px",fontSize:11}}>{copied==="ai"?"✓ Copied!":"Copy"}</button></div>}
              </div>
            )}

            {tab==="profile"&&(
              <div className="card" style={{padding:20}}>
                <h3 className="serif" style={{fontSize:18,marginBottom:16}}>Full Client Profile</h3>
                {[["Personal Details","#FAFAF7","#E8E5DF","#A8A29E",[["Client Code",s.cc],["Full Name",s.name],["Email",s.email],["WhatsApp",s.phone],["Date of Birth",s.dob],["Gender",s.gender],["City",s.city],["Source",s.source],["Added On",s.date]]],["Booking Details","#FAFAF7","#E8E5DF","#A8A29E",[["Service",s.service],["Client Type",s.ct],["Selected Plan",s.plan],["Referral Code",s.refCode],["Session Mode",s.sesMode],["Preferred Date",s.prefDate],["Weekend Slot",s.prefWE],["Weekday Slot",s.prefWD],["Stage",s.stage]]],["Health Information","#FFF8F0","#FDE68A","#92400E",[["Health Goals",s.goal],["Medical Conditions",s.conditions],["On Medication?",s.onMed],["Medications & Doses",s.meds],["Lab Reports",s.labs],["Prev Nutritionist?",s.prevNutri]]],["History & Notes","#F0FDF4","#BBF7D0","#166534",[["Worked with Taniya Before?",s.workedBefore],["Last Program",s.lastProgram],["Progress Since",s.progress],["Extra Notes",s.notes2]]]].map(([title,bg,border,lc,fields])=>{const vis=fields.filter(([,v])=>v);if(!vis.length)return null;return(<div key={title} style={{marginBottom:18}}><p style={{fontSize:10,fontWeight:600,color:"#A8A29E",textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>{title}</p><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{vis.map(([label,value])=>(<div key={label} style={{background:bg,borderRadius:10,padding:"12px 14px",border:`1px solid ${border}`}}><p style={{fontSize:10,fontWeight:600,color:lc,textTransform:"uppercase",letterSpacing:".05em",marginBottom:4}}>{label}</p><p style={{fontSize:13,color:"#1C1917",lineHeight:1.5}}>{String(value)}</p></div>))}</div></div>);})}</div>
            )}
          </div>
        );
      })()}
    </div>
  </div>

  {showAdd&&<div className="overlay" onClick={()=>setShowAdd(false)}><div className="modal fi" onClick={e=>e.stopPropagation()}><h2 className="serif" style={{fontSize:22,marginBottom:18}}>Add New Client</h2><div style={{display:"flex",flexDirection:"column",gap:10}}><input placeholder="Full Name *" value={newC.name} onChange={e=>setNewC(p=>({...p,name:e.target.value}))}/><input placeholder="Health Goal" value={newC.goal} onChange={e=>setNewC(p=>({...p,goal:e.target.value}))}/><input placeholder="WhatsApp Number" value={newC.phone} onChange={e=>setNewC(p=>({...p,phone:e.target.value}))}/><input placeholder="Email" value={newC.email} onChange={e=>setNewC(p=>({...p,email:e.target.value}))}/><input placeholder="Medical Conditions" value={newC.conditions} onChange={e=>setNewC(p=>({...p,conditions:e.target.value}))}/><input placeholder="Current Medications" value={newC.meds} onChange={e=>setNewC(p=>({...p,meds:e.target.value}))}/><div style={{display:"flex",gap:10}}><select value={newC.source} onChange={e=>setNewC(p=>({...p,source:e.target.value}))}>{["Instagram","WhatsApp","Email","Referral","Google Form","Other"].map(s=><option key={s}>{s}</option>)}</select><select value={newC.stage} onChange={e=>setNewC(p=>({...p,stage:e.target.value}))}>{STAGES.map(s=><option key={s}>{s}</option>)}</select></div><textarea placeholder="Additional notes..." value={newC.notes} onChange={e=>setNewC(p=>({...p,notes:e.target.value}))} rows={2}/></div><div style={{display:"flex",gap:10,marginTop:20}}><button className="btn" onClick={addC} style={{background:"#1C1917",color:"white",padding:"10px 22px",flex:1}}>Add Client</button><button className="btn" onClick={()=>setShowAdd(false)} style={{background:"#F5F3EE",color:"#57534E",padding:"10px 22px"}}>Cancel</button></div></div></div>}

  {showImport&&<div className="overlay" onClick={()=>setShowImport(false)}><div className="modal fi" onClick={e=>e.stopPropagation()} style={{width:600}}>
    <h2 className="serif" style={{fontSize:22,marginBottom:4}}>📥 Import Clients from Google Sheets</h2>
    <p style={{fontSize:13,color:"#78716C",marginBottom:16,lineHeight:1.6}}>
      Paste the JSON output from your Apps Script logs below. Run <strong>syncAllClients()</strong> in Apps Script, open Execution Log, copy everything starting with <strong>[{"</strong> to the end.
    </p>
    <textarea
      placeholder={'Paste your JSON here — starts with [{"Timestamp":...'}
      value={importJson}
      onChange={e=>setImportJson(e.target.value)}
      rows={10}
      style={{fontSize:12,lineHeight:1.5,fontFamily:"monospace",marginBottom:10,background:"#FAFAF7"}}
    />
    {importErr&&<p style={{fontSize:12,color:"#E11D48",marginBottom:10,background:"#FFF1F2",padding:"8px 12px",borderRadius:8}}>{importErr}</p>}
    <div style={{display:"flex",gap:10}}>
      <button className="btn" onClick={doImport} style={{background:"#16A34A",color:"white",padding:"10px 22px",flex:1,fontSize:14,fontWeight:600}}>✅ Import Now</button>
      <button className="btn" onClick={()=>setShowImport(false)} style={{background:"#F5F3EE",color:"#57534E",padding:"10px 22px"}}>Cancel</button>
    </div>
  </div></div>}

  {showSync&&<div className="overlay" onClick={()=>setShowSync(false)}><div className="modal fi" onClick={e=>e.stopPropagation()}><h2 className="serif" style={{fontSize:22,marginBottom:4}}>🔗 Google Sheets Sync</h2><p style={{fontSize:13,color:"#78716C",marginBottom:20,lineHeight:1.6}}>Use this Apps Script to export your Sheet data, then paste it into the browser console on this page.</p><div style={{position:"relative",marginBottom:16}}><div className="code">{script}</div><button className="btn" onClick={()=>copy(script,"script")} style={{position:"absolute",top:10,right:10,background:"#F59E0B",color:"#1C1917",padding:"5px 12px",fontSize:11}}>{copied==="script"?"✓ Copied!":"Copy"}</button></div><div style={{background:"#FFF8F0",border:"1px solid #FDE68A",borderRadius:10,padding:"12px 14px",marginBottom:16}}><p style={{fontSize:12,color:"#92400E",lineHeight:1.7}}><strong>Steps:</strong><br/>1. Paste script in Apps Script → run syncAllClients()<br/>2. Copy JSON output from Logs (View → Logs)<br/>3. Open browser console here (press F12)<br/>4. Type: <code>window.__receiveSheetData(PASTE_JSON)</code></p></div><button className="btn" onClick={()=>setShowSync(false)} style={{background:"#1C1917",color:"white",padding:"10px 22px",width:"100%"}}>Got it!</button></div></div>}
</div>
```

);
}
ReactDOM.createRoot(document.getElementById(“root”)).render(<App/>);
</script>

</body>
</html>
